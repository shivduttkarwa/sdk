<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      background: #060102;
    }

    .aleph-scroll {
      position: relative;
      height: 880vh;
      background: #060102;
    }

    .aleph-stage {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 43%, rgba(180, 20, 20, 0.42), transparent 31%),
        radial-gradient(circle at 50% 116%, rgba(140, 30, 20, 0.55), transparent 34%),
        radial-gradient(circle at 8% 22%, rgba(100, 10, 10, 0.65), transparent 39%),
        linear-gradient(180deg, #1a0505 0%, #0d0202 49%, #180404 80%, #2a0808 145%);
    }

    .aleph-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 42%, rgba(30, 4, 4, 0.17) 70%, rgba(10, 1, 1, 0.48) 100%),
        radial-gradient(circle at 50% 112%, rgba(180, 40, 40, 0.18), transparent 43%),
        linear-gradient(90deg, rgba(0,0,0,0.2), transparent 26%, transparent 74%, rgba(0,0,0,0.18));
    }

    .aleph-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0.28;
      background:
        repeating-linear-gradient(0deg, rgba(255,180,160,0.018) 0 1px, transparent 1px 4px),
        radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(0,0,0,0.22) 100%);
      mix-blend-mode: soft-light;
    }

    #alephCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 760px) {
      .aleph-scroll { height: 640vh; }
    }
  </style>
</head>
<body>

  <section class="aleph-scroll" id="alephScroll">
    <div class="aleph-stage">
      <canvas id="alephCanvas"></canvas>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const scrollSection = document.querySelector('#alephScroll');
    const canvas = document.querySelector('#alephCanvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x080101, 0.018);

    const camera = new THREE.PerspectiveCamera(43, window.innerWidth / window.innerHeight, 0.03, 220);
    camera.position.set(0, 0.08, 18.5);

    const root = new THREE.Group();
    scene.add(root);

    // Color palette — kind 0: gold, kind 1: crimson, kind 2: dark maroon, kind 3: atmosphere
    const uniforms = {
      uTime:   { value: 0 },
      uDpr:    { value: Math.min(window.devicePixelRatio || 1, 2) },
      uColorA: { value: new THREE.Color('#c89828') },  // gold  — rim, boss, spoke ends
      uColorB: { value: new THREE.Color('#c0141c') },  // crimson — main rings, spokes
      uColorC: { value: new THREE.Color('#3a0606') },  // dark maroon — inner ring
    };

    // NormalBlending = matte, solid-colour particles, no shiny glow
    const pointMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
      uniforms,
      vertexShader: `
        uniform float uTime;
        uniform float uDpr;
        attribute float aSize;
        attribute float aAlpha;
        attribute float aDepth;
        attribute float aKind;
        attribute float aSeed;
        varying float vAlpha;
        varying float vKind;

        void main() {
          vec3 p = position;
          p.z += sin(uTime * 0.42 + aSeed * 6.2831) * 0.012;

          vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
          gl_Position = projectionMatrix * mvPosition;
          float perspective = 500.0 / max(0.6, -mvPosition.z);
          gl_PointSize = aSize * uDpr * perspective;
          vAlpha = aAlpha;
          vKind  = aKind;
        }
      `,
      fragmentShader: `
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        uniform vec3 uColorC;
        varying float vAlpha;
        varying float vKind;

        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d    = length(uv);
          float disc = smoothstep(0.5, 0.08, d);

          vec3 col;
          if      (vKind < 0.5) col = uColorA;                       // gold
          else if (vKind < 1.5) col = uColorB;                       // crimson
          else if (vKind < 2.5) col = uColorC;                       // dark inner
          else                  col = mix(uColorC, uColorB, 0.18);   // atmosphere

          gl_FragColor = vec4(col, disc * vAlpha);
        }
      `
    });

    // Lines keep AdditiveBlending for a subtle wire-frame glow
    const lineGold = new THREE.LineBasicMaterial({ color: 0xc89020, transparent: true, opacity: 0.42, blending: THREE.AdditiveBlending, depthWrite: false });
    const lineRed  = new THREE.LineBasicMaterial({ color: 0x980e14, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending, depthWrite: false });
    const animatedLines = [];
    const textPlanes    = [];

    // Shield ring definitions
    const SHIELD_RINGS = [
      { r: 2.18, kind: 0 },  // outer rim — gold
      { r: 1.98, kind: 0 },  // inner rim lip — gold
      { r: 1.55, kind: 1 },  // ring 1 — crimson
      { r: 1.08, kind: 1 },  // ring 2 — crimson
      { r: 0.62, kind: 2 },  // inner ring — dark maroon
      { r: 0.24, kind: 0 },  // center boss — gold
    ];
    const SPOKE_COUNT = 8;

    function circleProfile(r, count) {
      const pts = [];
      for (let i = 0; i <= count; i++) {
        const a = (i / count) * Math.PI * 2;
        pts.push([Math.cos(a) * r, Math.sin(a) * r]);
      }
      return pts;
    }

    function addPoint(arrays, x, y, z, size, alpha, depth, kind, seed = Math.random()) {
      arrays.positions.push(x, y, z);
      arrays.sizes.push(size);
      arrays.alphas.push(alpha);
      arrays.depths.push(depth);
      arrays.kinds.push(kind);
      arrays.seeds.push(seed);
    }

    function addLine(points, material, baseOpacity, depth, scale, z) {
      const verts = [];
      for (const p of points) verts.push(p[0] * scale, p[1] * scale, z);
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
      const line = new THREE.Line(geometry, material.clone());
      line.material.opacity = baseOpacity;
      root.add(line);
      animatedLines.push({ line, baseOpacity, depth });
    }

    function buildShieldLayers() {
      const arrays = { positions: [], sizes: [], alphas: [], depths: [], kinds: [], seeds: [] };

      for (let layer = 0; layer < 72; layer++) {
        const d     = layer / 71;
        const z     = 7.5 - d * 38.0;
        const scale = 1.10 - d * 0.38;
        const alpha = 0.85 * Math.pow(1 - d, 0.30) + 0.05;

        // Concentric rings
        for (const ring of SHIELD_RINGS) {
          const r     = ring.r * scale;
          const count = Math.max(8, Math.floor(r * 165));
          for (let i = 0; i < count; i++) {
            const a = (i / count) * Math.PI * 2;
            addPoint(arrays,
              Math.cos(a) * r + (Math.random() - 0.5) * 0.006,
              Math.sin(a) * r + (Math.random() - 0.5) * 0.006,
              z,
              0.015 + Math.random() * 0.013,
              alpha * (0.78 + Math.random() * 0.36),
              d * 2.2,
              ring.kind
            );
          }
        }

        // 8 radial spokes — gold at junctions, crimson through middle
        const STEPS = 42;
        for (let spoke = 0; spoke < SPOKE_COUNT; spoke++) {
          const a = (spoke / SPOKE_COUNT) * Math.PI * 2;
          for (let s = 0; s <= STEPS; s++) {
            const t = s / STEPS;
            const r = (0.24 + t * (2.18 - 0.24)) * scale;
            const atJunction = t < 0.09 || t > 0.91;
            addPoint(arrays,
              Math.cos(a) * r + (Math.random() - 0.5) * 0.005,
              Math.sin(a) * r + (Math.random() - 0.5) * 0.005,
              z,
              0.009 + Math.random() * 0.007,
              alpha * (0.35 + Math.random() * 0.25),
              d * 2.2,
              atJunction ? 0 : 1
            );
          }
        }

        // Wire-frame lines every 4 layers: outer rim, ring1, boss
        if (layer % 4 === 0) {
          addLine(circleProfile(2.18, 220), lineGold, 0.40, d * 2.4, scale, z);
          addLine(circleProfile(1.55, 170), lineRed,  0.20, d * 2.4, scale, z);
          addLine(circleProfile(0.24,  70), lineGold, 0.32, d * 2.4, scale, z);
        }
      }

      // Ambient scatter just outside the shield
      for (let i = 0; i < 1600; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 1.9 + Math.pow(Math.random(), 0.6) * 1.3;
        const z = 7.4 - Math.random() * 40.0;
        addPoint(arrays,
          Math.cos(a) * r, Math.sin(a) * r, z,
          0.005 + Math.random() * 0.009,
          0.014 + Math.random() * 0.038,
          Math.random() * 1.8, 3
        );
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(arrays.positions, 3));
      geometry.setAttribute('aSize',    new THREE.Float32BufferAttribute(arrays.sizes,     1));
      geometry.setAttribute('aAlpha',   new THREE.Float32BufferAttribute(arrays.alphas,    1));
      geometry.setAttribute('aDepth',   new THREE.Float32BufferAttribute(arrays.depths,    1));
      geometry.setAttribute('aKind',    new THREE.Float32BufferAttribute(arrays.kinds,     1));
      geometry.setAttribute('aSeed',    new THREE.Float32BufferAttribute(arrays.seeds,     1));
      return geometry;
    }

    root.add(new THREE.Points(buildShieldLayers(), pointMaterial));

    function createTextTexture(text) {
      const c   = document.createElement('canvas');
      c.width   = 2048;
      c.height  = 512;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font         = '900 72px Inter, Arial, sans-serif';
      ctx.letterSpacing = '6px';
      ctx.shadowColor  = 'rgba(224, 63, 79, 0.95)';
      ctx.shadowBlur   = 28;
      ctx.fillStyle    = 'rgba(255, 235, 225, 0.94)';

      const words = text.toUpperCase().split(' ');
      let line = '';
      const lines = [];
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > 1560 && line) { lines.push(line); line = word; }
        else line = test;
      }
      lines.push(line);
      const startY = c.height / 2 - (lines.length - 1) * 48;
      lines.forEach((l, idx) => ctx.fillText(l, c.width / 2, startY + idx * 96));

      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    const deepTexts = [
      { text: 'Shivdutt Karwa',         z:  5.4, y:  0.00, scale: 1.25 },
      { text: 'Full Stack Developer',   z: -2.8, y:  0.06, scale: 1.12 },
      { text: 'Crafted with precision', z:-10.8, y: -0.02, scale: 1.08 },
      { text: 'Forged in code',         z:-18.8, y:  0.04, scale: 1.00 },
      { text: 'Push limits',            z:-27.2, y:  0.00, scale: 0.96 },
    ];

    deepTexts.forEach(item => {
      const mat  = new THREE.MeshBasicMaterial({ map: createTextTexture(item.text), transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthWrite: false });
      const geo  = new THREE.PlaneGeometry(5.6 * item.scale, 1.4 * item.scale);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(0.32, item.y, item.z);
      mesh.userData.baseZ       = item.z;
      mesh.userData.baseOpacity = 0.88;
      textPlanes.push(mesh);
      root.add(mesh);
    });

    let targetProgress = 0;
    let progress       = 0;
    let mouseX         = 0;
    let mouseY         = 0;

    function smootherstep(v) {
      const x = Math.min(1, Math.max(0, v));
      return x * x * x * (x * (x * 6 - 15) + 10);
    }

    ScrollTrigger.create({
      trigger: scrollSection,
      start: 'top top',
      end: 'bottom bottom',
      pin: '.aleph-stage',
      pinSpacing: false,
      scrub: true,
      anticipatePin: 1,
      invalidateOnRefresh: true,
      onUpdate(self) { targetProgress = self.progress; }
    });

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      uniforms.uDpr.value = Math.min(window.devicePixelRatio || 1, 2);
      ScrollTrigger.refresh();
    }

    window.addEventListener('resize', resize);
    window.addEventListener('pointermove', e => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    resize();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();
      progress += (targetProgress - progress) * 0.08;
      const travel = smootherstep((progress - 0.065) / 0.935);

      uniforms.uTime.value = time;

      const camZ    = 18.5 - travel * 39.5;
      const targetZ =  4.7 - travel * 29.5;
      camera.position.z += (camZ    - camera.position.z) * 0.065;
      camera.position.x += ((mouseX * 0.14) - camera.position.x) * 0.045;
      camera.position.y += ((0.08 - mouseY * 0.075) - camera.position.y) * 0.045;
      camera.lookAt(0.24 + mouseX * 0.08, -0.02, targetZ);

      root.rotation.y += ((-0.15 + travel * 0.46 + mouseX * 0.04) - root.rotation.y) * 0.05;
      root.rotation.x += ((-mouseY * 0.028) - root.rotation.x) * 0.05;
      root.rotation.z  = Math.sin(time * 0.11) * 0.008;
      root.scale.setScalar(1.0 + travel * 0.08);

      for (const mesh of textPlanes) {
        const dz       = Math.abs(mesh.position.z - targetZ);
        const visible  = smootherstep(1 - dz / 5.2);
        const tooClose = smootherstep((dz - 0.8) / 1.4);
        mesh.material.opacity = visible * tooClose * mesh.userData.baseOpacity;
        mesh.position.z = mesh.userData.baseZ + Math.sin(time * 0.22 + mesh.userData.baseZ) * 0.04;
        mesh.lookAt(camera.position);
      }

      for (const item of animatedLines) {
        item.line.position.z       = travel * item.depth * 4.2 + Math.sin(time * 0.28 + item.depth * 7) * 0.025;
        item.line.material.opacity = item.baseOpacity * (0.8 + 0.2 * Math.sin(time * 0.7 + item.depth * 9));
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
