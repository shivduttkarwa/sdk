<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      background: #050101;
    }

    .aleph-scroll {
      position: relative;
      height: 880vh;
      background: #050101;
    }

    .aleph-stage {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(35,3,3,0.7) 0%, transparent 55%),
        #050101;
    }

    #alephCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 760px) {
      .aleph-scroll { height: 640vh; }
    }
  </style>
</head>
<body>

  <section class="aleph-scroll" id="alephScroll">
    <div class="aleph-stage">
      <canvas id="alephCanvas"></canvas>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const scrollSection = document.querySelector('#alephScroll');
    const canvas        = document.querySelector('#alephCanvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setClearColor(0x050101, 1);   // opaque dark — no CSS bleed
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050101, 0.024);  // rings fade to dark at distance

    const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.03, 200);
    camera.position.set(0, 0, 18.5);

    const root = new THREE.Group();
    scene.add(root);

    // Samurai palette only — gold / crimson / deep maroon
    const uniforms = {
      uTime:   { value: 0 },
      uDpr:    { value: Math.min(window.devicePixelRatio || 1, 2) },
      uColorA: { value: new THREE.Color('#c89020') },   // gold  — rim, boss, spoke ends
      uColorB: { value: new THREE.Color('#b81020') },   // crimson — main rings / spokes
      uColorC: { value: new THREE.Color('#1e0204') },   // deep maroon — depth fade
    };

    const pointMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite:  false,
      blending:    THREE.NormalBlending,
      uniforms,
      vertexShader: `
        uniform float uTime;
        uniform float uDpr;
        attribute float aSize;
        attribute float aAlpha;
        attribute float aDepth;
        attribute float aKind;
        attribute float aSeed;
        varying float vAlpha;
        varying float vKind;
        varying float vDepth;

        void main() {
          vec3 p = position;
          // Uniform slow pulse — no per-particle sparkling
          p.z += sin(uTime * 0.30 + aSeed * 1.40) * 0.006;

          vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
          gl_Position = projectionMatrix * mvPosition;
          float perspective = 500.0 / max(0.6, -mvPosition.z);
          gl_PointSize = aSize * uDpr * perspective;
          vAlpha = aAlpha;
          vKind  = aKind;
          vDepth = aDepth;
        }
      `,
      fragmentShader: `
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        uniform vec3 uColorC;
        varying float vAlpha;
        varying float vKind;
        varying float vDepth;

        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d    = length(uv);
          float disc = smoothstep(0.5, 0.08, d);

          vec3 col;
          if (vKind < 0.5) {
            // Gold — rim and boss; slightly darkened at depth
            col = mix(uColorA, uColorC, clamp(vDepth * 0.38, 0.0, 1.0));
          } else {
            // Crimson — rings / spokes; fades to deep maroon
            col = mix(uColorB, uColorC, clamp(vDepth * 0.52, 0.0, 1.0));
          }

          gl_FragColor = vec4(col, disc * vAlpha);
        }
      `
    });

    // Wire-frame ring lines — additive at low opacity for subtle glow on edges
    const lineGold = new THREE.LineBasicMaterial({ color: 0xc89020, transparent: true, opacity: 0.38, blending: THREE.AdditiveBlending, depthWrite: false });
    const lineRed  = new THREE.LineBasicMaterial({ color: 0x980e14, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending, depthWrite: false });
    const animatedLines = [];
    const textPlanes    = [];

    // Ring definitions — two gold (rim), three crimson, gold boss
    const RINGS = [
      { r: 2.20, kind: 0 },
      { r: 1.94, kind: 0 },
      { r: 1.52, kind: 1 },
      { r: 1.08, kind: 1 },
      { r: 0.62, kind: 1 },
      { r: 0.22, kind: 0 },
    ];
    const SPOKES = 8;

    function circleProfile(r, count) {
      const pts = [];
      for (let i = 0; i <= count; i++) {
        const a = (i / count) * Math.PI * 2;
        pts.push([Math.cos(a) * r, Math.sin(a) * r]);
      }
      return pts;
    }

    function addPoint(a, x, y, z, size, alpha, depth, kind, seed = Math.random()) {
      a.positions.push(x, y, z);
      a.sizes.push(size);
      a.alphas.push(alpha);
      a.depths.push(depth);
      a.kinds.push(kind);
      a.seeds.push(seed);
    }

    function addLine(pts, mat, baseOpacity, depth, z) {
      const verts = [];
      for (const p of pts) verts.push(p[0], p[1], z);
      const geo  = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
      const line = new THREE.Line(geo, mat.clone());
      line.material.opacity = baseOpacity;
      root.add(line);
      animatedLines.push({ line, baseOpacity, depth });
    }

    function buildPortalLayers() {
      const a = { positions: [], sizes: [], alphas: [], depths: [], kinds: [], seeds: [] };

      // 80 circle layers — all same physical radius (perspective makes near=large, far=small)
      for (let layer = 0; layer < 80; layer++) {
        const d     = layer / 79;
        const z     = 8.0 - d * 42.0;   // z: +8 (front) → -34 (back)
        const alpha = 0.82 * Math.pow(1 - d, 0.22) + 0.05;

        // Concentric rings
        for (const ring of RINGS) {
          const count = Math.max(10, Math.floor(ring.r * 175));
          for (let i = 0; i < count; i++) {
            const ang = (i / count) * Math.PI * 2;
            addPoint(a,
              Math.cos(ang) * ring.r + (Math.random() - 0.5) * 0.005,
              Math.sin(ang) * ring.r + (Math.random() - 0.5) * 0.005,
              z,
              0.014 + Math.random() * 0.012,
              alpha * (0.80 + Math.random() * 0.28),
              d * 2.0,
              ring.kind
            );
          }
        }

        // 8 spokes — gold at rim/boss junctions, crimson through middle
        const STEPS = 40;
        for (let s = 0; s < SPOKES; s++) {
          const ang = (s / SPOKES) * Math.PI * 2;
          for (let t = 0; t <= STEPS; t++) {
            const p = t / STEPS;
            const r = 0.22 + p * (2.20 - 0.22);
            addPoint(a,
              Math.cos(ang) * r + (Math.random() - 0.5) * 0.004,
              Math.sin(ang) * r + (Math.random() - 0.5) * 0.004,
              z,
              0.008 + Math.random() * 0.006,
              alpha * (0.30 + Math.random() * 0.18),
              d * 2.0,
              (p < 0.08 || p > 0.92) ? 0 : 1   // gold ends, crimson shaft
            );
          }
        }

        // Wire-frame lines: outer rim every 5 layers, mid ring every 10
        if (layer % 5 === 0)
          addLine(circleProfile(2.20, 220), lineGold, 0.36, d * 2.2, z);
        if (layer % 5 === 0)
          addLine(circleProfile(1.52, 165), lineRed,  0.17, d * 2.2, z);
        if (layer % 10 === 0)
          addLine(circleProfile(0.22,  65), lineGold, 0.26, d * 2.2, z);
      }

      // Minimal dark scatter just outside rings — no bright colours
      for (let i = 0; i < 700; i++) {
        const ang = Math.random() * Math.PI * 2;
        const r   = 2.25 + Math.random() * 0.9;
        const z   = 8.0 - Math.random() * 42.0;
        addPoint(a,
          Math.cos(ang) * r, Math.sin(ang) * r, z,
          0.005 + Math.random() * 0.007,
          0.012 + Math.random() * 0.028,
          0.8 + Math.random() * 1.2, 1   // crimson kind, darkened by depth
        );
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(a.positions, 3));
      geo.setAttribute('aSize',    new THREE.Float32BufferAttribute(a.sizes,     1));
      geo.setAttribute('aAlpha',   new THREE.Float32BufferAttribute(a.alphas,    1));
      geo.setAttribute('aDepth',   new THREE.Float32BufferAttribute(a.depths,    1));
      geo.setAttribute('aKind',    new THREE.Float32BufferAttribute(a.kinds,     1));
      geo.setAttribute('aSeed',    new THREE.Float32BufferAttribute(a.seeds,     1));
      return geo;
    }

    root.add(new THREE.Points(buildPortalLayers(), pointMaterial));

    function createTextTexture(text) {
      const c   = document.createElement('canvas');
      c.width   = 2048;
      c.height  = 512;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font         = '900 72px Inter, Arial, sans-serif';
      ctx.letterSpacing = '6px';
      ctx.shadowColor  = 'rgba(200, 80, 20, 0.90)';
      ctx.shadowBlur   = 24;
      ctx.fillStyle    = 'rgba(248, 220, 185, 0.92)';

      const words = text.toUpperCase().split(' ');
      let line = '';
      const lines = [];
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > 1560 && line) { lines.push(line); line = word; }
        else line = test;
      }
      lines.push(line);
      const startY = c.height / 2 - (lines.length - 1) * 48;
      lines.forEach((l, idx) => ctx.fillText(l, c.width / 2, startY + idx * 96));

      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    const deepTexts = [
      { text: 'Shivdutt Karwa',         z:  5.4, y:  0.00, scale: 1.20 },
      { text: 'Full Stack Developer',   z: -3.8, y:  0.00, scale: 1.08 },
      { text: 'Crafted with precision', z:-12.5, y:  0.00, scale: 1.04 },
      { text: 'Forged in code',         z:-21.0, y:  0.00, scale: 1.00 },
      { text: 'Push limits',            z:-30.0, y:  0.00, scale: 0.96 },
    ];

    deepTexts.forEach(item => {
      const mat  = new THREE.MeshBasicMaterial({ map: createTextTexture(item.text), transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthWrite: false });
      const geo  = new THREE.PlaneGeometry(5.4 * item.scale, 1.35 * item.scale);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(0, item.y, item.z);
      mesh.userData.baseZ       = item.z;
      mesh.userData.baseOpacity = 0.85;
      textPlanes.push(mesh);
      root.add(mesh);
    });

    let targetProgress = 0;
    let progress       = 0;
    let mouseX         = 0;
    let mouseY         = 0;

    function smootherstep(v) {
      const x = Math.min(1, Math.max(0, v));
      return x * x * x * (x * (x * 6 - 15) + 10);
    }

    ScrollTrigger.create({
      trigger: scrollSection,
      start: 'top top',
      end: 'bottom bottom',
      pin: '.aleph-stage',
      pinSpacing: false,
      scrub: true,
      anticipatePin: 1,
      invalidateOnRefresh: true,
      onUpdate(self) { targetProgress = self.progress; }
    });

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      uniforms.uDpr.value = Math.min(window.devicePixelRatio || 1, 2);
      ScrollTrigger.refresh();
    }

    window.addEventListener('resize', resize);
    window.addEventListener('pointermove', e => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    resize();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();
      progress += (targetProgress - progress) * 0.08;
      const travel = smootherstep((progress - 0.05) / 0.95);

      uniforms.uTime.value = time;

      // Straight-through travel — camera moves along z with no deviation
      const camZ = 18.5 - travel * 53.0;   // 18.5 → -34.5  (through all 80 layers)
      camera.position.z += (camZ - camera.position.z) * 0.065;

      // Very subtle mouse parallax — keeps feel of control without veering off axis
      camera.position.x += ((mouseX * 0.04) - camera.position.x) * 0.04;
      camera.position.y += ((-mouseY * 0.04) - camera.position.y) * 0.04;

      // Always look straight ahead along z — no side drift
      camera.lookAt(0, 0, camera.position.z - 6);

      // No Y/X rotation on root — circles stay perfectly perpendicular
      root.rotation.x = 0;
      root.rotation.y = 0;
      root.rotation.z = Math.sin(time * 0.07) * 0.004;  // barely-perceptible slow turn

      for (const mesh of textPlanes) {
        const lookZ    = camera.position.z - 6;
        const dz       = Math.abs(mesh.position.z - lookZ);
        const visible  = smootherstep(1 - dz / 5.0);
        const tooClose = smootherstep((dz - 0.8) / 1.4);
        mesh.material.opacity = visible * tooClose * mesh.userData.baseOpacity;
        mesh.position.z = mesh.userData.baseZ + Math.sin(time * 0.18 + mesh.userData.baseZ) * 0.03;
        mesh.lookAt(camera.position);
      }

      for (const item of animatedLines) {
        item.line.material.opacity = item.baseOpacity * (0.82 + 0.18 * Math.sin(time * 0.55 + item.depth * 5));
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
