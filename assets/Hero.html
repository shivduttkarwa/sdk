<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hero v4 — Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0F14;
    --bg-2:#0A0B0F;
    --fg:#E8E8EC;
    --fg-2:#9A9BA4;
    --mute:#52535C;
    --line:#1B1C22;
    --acc:#7C5CFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg)}
  html{scroll-behavior:smooth}
  body{
    font-family:"Archivo",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    font-feature-settings:"ss01";
    min-height: 320vh;  /* scroll runway for the parallax */
  }
  ::selection{background:var(--acc);color:#000}

  /* fixed cinematic stage */
  .stage{
    position:fixed;inset:0;
    overflow:hidden;
    background:var(--bg);
  }

  /* ─── deep ground plane (perspective grid) ─── */
  .ground{
    position:absolute;left:50%;top:62%;
    width:260vw;height:140vh;
    transform-origin: 50% 0;
    transform: translate(-50%, 0) perspective(900px) rotateX(74deg);
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse at 50% 0%, #000 0%, #000 40%, transparent 80%);
    opacity:.7;
    will-change: transform;
  }

/* ─── back display word — sits BEHIND the portrait ─── */
  .back-word{
    position:absolute;left:50%;top:50%;
    transform: translate(-50%,-58%);
    font-family:"Archivo",sans-serif;
    font-weight:900;
    font-size: clamp(90px, 15vw, 240px);
    letter-spacing:-0.05em;
    line-height:.82;
    color: #14151B;             /* very low contrast — felt, not read */
    white-space:nowrap;
    z-index:1;
    will-change: transform, opacity;
  }

  /* ─── portrait (mid plane) ─── */
  .portrait-wrap{
    position:absolute;left:50%;top:54%;
    transform: translate(-50%,-50%);
    width: clamp(280px, 34vw, 520px);
    aspect-ratio: 4/5;
    z-index:2;
    will-change: transform;
  }
  .portrait{
    position:absolute;inset:0;
    background:#1A1B22;
    overflow:hidden;
    /* Placeholder — replace with real portrait via .portrait img */
  }
  .portrait img{
    width:100%;height:100%;object-fit:cover;display:block;
    filter: grayscale(.15) contrast(1.05);
  }
  /* placeholder pattern (visible until user drops a real portrait) */
  .portrait .ph{
    position:absolute;inset:0;
    background:
      repeating-linear-gradient(135deg, #14151C 0 12px, #181922 12px 24px);
    display:grid;place-items:center;
  }
  .portrait .ph span{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-2)
  }
  .portrait::after{
    /* subtle inner edge so the photo plane reads as a print */
    content:"";position:absolute;inset:0;box-shadow: inset 0 0 0 1px #00000080;
    pointer-events:none;
  }

  /* tiny corner registration marks on the portrait */
  .portrait-wrap .reg{position:absolute;width:12px;height:12px;border:1px solid var(--fg-2)}
  .portrait-wrap .reg.tl{top:-6px;left:-6px;border-right:0;border-bottom:0}
  .portrait-wrap .reg.tr{top:-6px;right:-6px;border-left:0;border-bottom:0}
  .portrait-wrap .reg.bl{bottom:-6px;left:-6px;border-right:0;border-top:0}
  .portrait-wrap .reg.br{bottom:-6px;right:-6px;border-left:0;border-top:0}

  /* ─── front display word — passes IN FRONT of the portrait on scroll ─── */
  .front-word{
    position:absolute;left:50%;top:54%;
    transform: translate(-50%,-50%);
    font-family:"Archivo",sans-serif;
    font-weight:900;
    font-size: clamp(90px, 15vw, 240px);
    letter-spacing:-0.05em;
    line-height:.82;
    color: var(--fg);
    white-space:nowrap;
    z-index:3;
    pointer-events:none;
    will-change: transform, opacity;
    mix-blend-mode: difference;
  }

  /* ─── corner chrome (minimal) ─── */
  .chrome{
    position:absolute;inset:0;z-index:5;pointer-events:none;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-2);
  }
  .chrome > *{position:absolute;pointer-events:auto}
  .chrome a{color:inherit;text-decoration:none}

  .c-name{top:28px;left:32px;color:var(--fg);display:flex;align-items:center;gap:12px}
  .c-name .sq{width:10px;height:10px;background:var(--acc)}

  .c-nav{top:28px;right:32px;display:flex;gap:28px}
  .c-nav a{position:relative}
  .c-nav a:hover{color:var(--fg)}

  .c-meta{bottom:28px;left:32px;line-height:1.7}
  .c-meta b{color:var(--fg);font-weight:500}

  .c-cta{bottom:28px;right:32px;display:flex;gap:24px;align-items:center}
  .c-cta a{color:var(--fg);display:inline-flex;align-items:center;gap:10px;border-bottom:1px solid var(--fg);padding-bottom:4px;transition:color .2s,border-color .2s}
  .c-cta a:hover{color:var(--acc);border-color:var(--acc)}

  /* progress hairline at very top */
  .prog{
    position:absolute;left:0;top:0;height:1px;background:var(--acc);width:0%;z-index:6;
  }

  /* scroll cue */
  .cue{
    position:absolute;left:50%;bottom:28px;transform:translateX(-50%);
    font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--mute);
    display:flex;flex-direction:column;align-items:center;gap:10px;
    pointer-events:none;z-index:5;
  }
  .cue .l{width:1px;height:36px;background:var(--mute);position:relative;overflow:hidden}
  .cue .l::after{content:"";position:absolute;left:0;right:0;top:-50%;height:50%;background:var(--fg);animation:drip 2.2s ease-in-out infinite}
  @keyframes drip{
    0%{transform:translateY(0)}
    100%{transform:translateY(200%)}
  }

  @media (max-width: 760px){
    .c-nav, .c-cta{display:none}
    .c-meta{bottom:16px;left:16px}
    .c-name{top:16px;left:16px}
  }
</style>
</head>
<body>

<div class="stage" data-screen-label="Hero">
  <div class="prog" id="prog"></div>

  <!-- ground plane -->
  <div class="ground" id="ground"></div>

  <!-- back word (recedes) -->
  <div class="back-word" id="back">FULL STACK</div>

  <!-- portrait (slight forward push) -->
  <div class="portrait-wrap" id="portrait">
    <span class="reg tl"></span><span class="reg tr"></span>
    <span class="reg bl"></span><span class="reg br"></span>
    <div class="portrait">
      <img src="1111.png" alt="Portrait">
    </div>
  </div>

  <!-- front word (advances over portrait) -->
  <div class="front-word" id="front">LETS BUILD</div>

  <!-- corner chrome — minimal -->
  <div class="chrome">
    <div class="c-name"><span class="sq"></span> Shivdutt Karwa</div>
    <nav class="c-nav">
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
    <div class="c-meta">
      Engineer / Systems<br>
      <b>Berlin · Remote</b><br>
      Available · Q3 / 2026
    </div>
    <div class="c-cta">
      <a href="#">Selected work →</a>
    </div>
  </div>

  <!-- scroll cue -->
  <div class="cue" id="cue"><span>Scroll</span><span class="l"></span></div>
</div>

<script>
  // Scroll-driven cinematic parallax — no cursor, no idle wobble, no clutter.
  (function(){
    const ground   = document.getElementById('ground');
    const back     = document.getElementById('back');
    const front    = document.getElementById('front');
    const portrait = document.getElementById('portrait');
    const prog     = document.getElementById('prog');
    const cue      = document.getElementById('cue');

    const max = () => document.documentElement.scrollHeight - window.innerHeight;

    function frame(){
      const y = window.scrollY;
      const t = Math.min(1, y / max());     // 0..1

      // progress bar
      prog.style.width = (t * 100).toFixed(2) + '%';

      // ground recedes & shifts up
      ground.style.transform =
        `translate(-50%, ${(-t*120).toFixed(1)}px) perspective(900px) rotateX(${74 - t*6}deg) scale(${1 + t*0.15})`;

// back word: drifts up slowly, fades
      back.style.transform =
        `translate(-50%, calc(-58% + ${(-t*180).toFixed(1)}px)) scale(${1 + t*0.12})`;
      back.style.opacity = (1 - t*0.7).toFixed(2);

      // portrait: pushes forward then drifts up
      const ps = 1 + t*0.18;
      portrait.style.transform =
        `translate(-50%, calc(-50% + ${(-t*220).toFixed(1)}px)) scale(${ps})`;

      // front word: comes from below, scales past camera
      const fs = 1 + t*1.6;
      front.style.transform =
        `translate(-50%, calc(-50% + ${(80 - t*340).toFixed(1)}px)) scale(${fs})`;
      front.style.opacity = (Math.max(0, 1 - Math.max(0, t-0.55)*2.5)).toFixed(2);

      // hide the scroll cue once moving
      cue.style.opacity = (Math.max(0, 1 - t*5)).toFixed(2);
    }

    let raf = 0;
    function onScroll(){
      if (raf) return;
      raf = requestAnimationFrame(()=>{ raf = 0; frame(); });
    }
    window.addEventListener('scroll', onScroll, {passive:true});
    window.addEventListener('resize', frame);
    frame();
  })();
</script>

</body>
</html>
