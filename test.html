<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samurai Coding Preloader</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --red: #c01818;
      --dark-red: #4b0505;
      --gold: #f4c56f;
      --cream: #fff1cf;
      --black: #050303;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: #090909;
      color: white;
    }

    .samurai-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(180, 18, 18, 0.28), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(244, 197, 111, 0.08), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(180, 18, 18, 0.15), transparent 34%),
        linear-gradient(135deg, #030202, #0c0606 48%, #030303);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .samurai-loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .code-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.42;
      mix-blend-mode: screen;
    }

    .loader-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.34;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.38) 58%, rgba(0,0,0,0.9) 100%);
      pointer-events: none;
    }

    .loader-core {
      position: relative;
      width: min(560px, 94vw);
      height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .core-aura {
      position: absolute;
      width: 390px;
      height: 390px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(190, 20, 20, 0.46), transparent 60%),
        radial-gradient(circle at 38% 22%, rgba(244, 197, 111, 0.23), transparent 40%);
      filter: blur(38px);
      animation: auraPulse 2.8s ease-in-out infinite alternate;
      z-index: -4;
    }

    @keyframes auraPulse {
      from {
        transform: scale(0.84);
        opacity: 0.55;
      }

      to {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(244, 197, 111, 0.18);
      box-shadow:
        inset 0 0 28px rgba(190, 20, 20, 0.18),
        0 0 34px rgba(244, 197, 111, 0.08);
    }

    .ring-1 {
      width: 390px;
      height: 390px;
      animation: spin 15s linear infinite;
    }

    .ring-2 {
      width: 300px;
      height: 300px;
      border-style: dashed;
      border-color: rgba(255,255,255,0.15);
      animation: spinReverse 10s linear infinite;
    }

    .ring-3 {
      width: 465px;
      height: 465px;
      border-color: rgba(190, 20, 20, 0.18);
      animation: spin 22s linear infinite;
    }

    .ring::before {
      content: "";
      position: absolute;
      top: 36px;
      left: 50%;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow:
        0 0 12px var(--gold),
        0 0 28px rgba(244, 197, 111, 0.65);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spinReverse {
      to {
        transform: rotate(-360deg);
      }
    }

    /* ==============================
       CROSSED SWORDS CENTER
    ============================== */

    .sword-emblem {
      position: relative;
      width: 330px;
      height: 330px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: emblemRotate 12s linear infinite;
      filter:
        drop-shadow(0 0 22px rgba(190, 20, 20, 0.75))
        drop-shadow(0 0 42px rgba(244, 197, 111, 0.2));
      z-index: 3;
    }

    .sword-emblem::before {
      content: "";
      position: absolute;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(190, 20, 20, 0.45), transparent 62%);
      border: 1px solid rgba(244, 197, 111, 0.22);
      box-shadow:
        inset 0 0 30px rgba(244, 197, 111, 0.08),
        0 0 42px rgba(190, 20, 20, 0.45);
      z-index: -1;
    }

    .sword-emblem::after {
      content: "</>";
      position: absolute;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 2px;
      color: rgba(255, 241, 207, 0.92);
      text-shadow:
        0 0 12px rgba(244, 197, 111, 0.7),
        0 0 26px rgba(190, 20, 20, 0.7);
      z-index: 5;
      animation: codePulse 1.7s ease-in-out infinite alternate;
    }

    .sword {
      position: absolute;
      width: 310px;
      height: auto;
      object-fit: contain;
      transform-origin: center;
      user-select: none;
      pointer-events: none;
    }

    .sword-one {
      transform: rotate(45deg);
    }

    .sword-two {
      transform: rotate(-45deg) scaleX(-1);
    }

    @keyframes emblemRotate {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes codePulse {
      from {
        opacity: 0.65;
        transform: scale(0.96);
      }

      to {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    .orbit-code {
      position: absolute;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(244, 197, 111, 0.18);
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(12px);
      color: rgba(255, 241, 207, 0.78);
      font-size: 11px;
      letter-spacing: 1.4px;
      font-family: "Consolas", monospace;
      box-shadow: 0 0 22px rgba(190, 20, 20, 0.14);
      animation: floatChip 3.6s ease-in-out infinite;
      z-index: 4;
    }

    .chip-1 {
      top: 108px;
      left: 22px;
    }

    .chip-2 {
      top: 145px;
      right: 8px;
      animation-delay: -1.2s;
    }

    .chip-3 {
      bottom: 158px;
      left: 40px;
      animation-delay: -2s;
    }

    .chip-4 {
      bottom: 118px;
      right: 48px;
      animation-delay: -2.8s;
    }

    @keyframes floatChip {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.6;
      }

      50% {
        transform: translateY(-14px);
        opacity: 1;
      }
    }

    .loader-panel {
      position: absolute;
      bottom: 0;
      width: min(470px, 90vw);
      padding: 22px 24px 24px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.025)),
        rgba(7, 7, 7, 0.74);
      border: 1px solid rgba(244, 197, 111, 0.16);
      backdrop-filter: blur(18px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 30px 90px rgba(0,0,0,0.58);
      z-index: 6;
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-top h1 {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cream);
      font-weight: 900;
      text-shadow: 0 0 18px rgba(244, 197, 111, 0.34);
    }

    .count {
      font-size: 13px;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .terminal {
      min-height: 20px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
      color: rgba(255, 239, 210, 0.72);
      margin-bottom: 18px;
      white-space: nowrap;
      overflow: hidden;
    }

    .terminal::before {
      content: "> ";
      color: var(--red);
      text-shadow: 0 0 12px rgba(190,20,20,0.8);
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      margin-left: 4px;
      background: var(--gold);
      vertical-align: middle;
      animation: cursorBlink 0.8s steps(2) infinite;
    }

    @keyframes cursorBlink {
      50% {
        opacity: 0;
      }
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.55);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, var(--red), #d86a31, var(--gold), var(--cream));
      box-shadow:
        0 0 14px rgba(244, 197, 111, 0.8),
        0 0 28px rgba(190,20,20,0.5);
      transition: width 0.25s ease;
    }

    .progress-track::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: translateX(-120%);
      animation: shine 1.7s ease-in-out infinite;
    }

    @keyframes shine {
      to {
        transform: translateX(120%);
      }
    }

    .slash-exit {
      position: absolute;
      inset: -35%;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      background:
        linear-gradient(
          115deg,
          transparent 0%,
          transparent 43%,
          rgba(255,255,255,0.95) 48%,
          rgba(244,197,111,0.95) 50%,
          rgba(190,20,20,0.95) 52%,
          transparent 58%,
          transparent 100%
        );
      transform: translateX(-115%) rotate(-8deg);
    }

    .samurai-loader.exit .slash-exit {
      animation: slashExit 1.1s cubic-bezier(.19,1,.22,1) forwards;
    }

    @keyframes slashExit {
      0% {
        transform: translateX(-115%) rotate(-8deg);
        opacity: 0;
      }

      18% {
        opacity: 1;
      }

      100% {
        transform: translateX(115%) rotate(-8deg);
        opacity: 0;
      }
    }

    .site-content {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px;
      background:
        radial-gradient(circle at 50% 30%, rgba(190,20,20,0.18), transparent 36%),
        linear-gradient(135deg, #070707, #0d0707);
      opacity: 0;
      transform: translateY(30px);
      transition: 1s cubic-bezier(.19,1,.22,1);
    }

    body.loaded {
      overflow: auto;
    }

    body.loaded .site-content {
      opacity: 1;
      transform: translateY(0);
    }

    .site-content h2 {
      font-size: clamp(42px, 8vw, 96px);
      line-height: 0.92;
      letter-spacing: -3px;
      text-transform: uppercase;
      color: #fff0cf;
      text-shadow: 0 0 40px rgba(190,20,20,0.35);
    }

    .site-content p {
      margin-top: 22px;
      color: rgba(255,255,255,0.68);
      max-width: 650px;
      line-height: 1.7;
    }

    @media (max-width: 620px) {
      .loader-core {
        height: 600px;
      }

      .sword-emblem {
        width: 260px;
        height: 260px;
      }

      .sword {
        width: 250px;
      }

      .ring-1 {
        width: 320px;
        height: 320px;
      }

      .ring-2 {
        width: 250px;
        height: 250px;
      }

      .ring-3 {
        width: 385px;
        height: 385px;
      }

      .orbit-code {
        display: none;
      }

      .panel-top h1 {
        font-size: 11px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>

<body>

  <div class="samurai-loader" id="loader">
    <canvas class="code-canvas" id="codeCanvas"></canvas>

    <div class="loader-grid"></div>
    <div class="vignette"></div>
    <div class="slash-exit"></div>

    <div class="loader-core">
      <div class="core-aura"></div>

      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>

      <div class="orbit-code chip-1">const craft = true;</div>
      <div class="orbit-code chip-2">&lt;React /&gt;</div>
      <div class="orbit-code chip-3">GSAP.timeline()</div>
      <div class="orbit-code chip-4">deploy()</div>

      <div class="sword-emblem">
        <img class="sword sword-one" src="assets/sword-red.png" alt="Samurai sword">
        <img class="sword sword-two" src="assets/sword-red.png" alt="Samurai sword">
      </div>

      <div class="loader-panel">
        <div class="panel-top">
          <h1>Forging Interface</h1>
          <div class="count" id="count">000%</div>
        </div>

        <div class="terminal">
          <span id="terminalText"></span><span class="cursor"></span>
        </div>

        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>
  </div>

  <main class="site-content">
    <div>
      <h2>Code. Craft. Honor.</h2>
      <p>
        Your samurai coding portfolio is ready. Replace this content with your actual website.
      </p>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("codeCanvas");
    const ctx = canvas.getContext("2d");

    let width;
    let height;
    let columns;
    let drops;

    const symbols = [
      "0", "1", "{", "}", "<", ">", "/", "=", ";",
      "JS", "CSS", "HTML", "React", "GSAP", "const", "let", "fn"
    ];

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      columns = Math.floor(width / 26);
      drops = Array(columns).fill(1);
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function drawCodeRain() {
      ctx.fillStyle = "rgba(5, 3, 3, 0.12)";
      ctx.fillRect(0, 0, width, height);

      ctx.font = "13px Consolas, monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = symbols[Math.floor(Math.random() * symbols.length)];
        const x = i * 26;
        const y = drops[i] * 22;

        ctx.fillStyle = Math.random() > 0.86
          ? "rgba(244, 197, 111, 0.86)"
          : "rgba(190, 42, 32, 0.52)";

        ctx.fillText(text, x, y);

        if (y > height && Math.random() > 0.965) {
          drops[i] = 0;
        }

        drops[i]++;
      }

      requestAnimationFrame(drawCodeRain);
    }

    drawCodeRain();

    const loader = document.getElementById("loader");
    const progressBar = document.getElementById("progressBar");
    const count = document.getElementById("count");
    const terminalText = document.getElementById("terminalText");

    const lines = [
      "loading sword assets...",
      "compiling samurai interface...",
      "syncing code particles...",
      "forging modern interactions...",
      "preparing slash transition...",
      "deployment honor ready..."
    ];

    let progress = 0;
    let lineIndex = 0;
    let charIndex = 0;
    let currentText = "";

    function typeTerminal() {
      const fullLine = lines[lineIndex];

      if (charIndex < fullLine.length) {
        currentText += fullLine.charAt(charIndex);
        terminalText.textContent = currentText;
        charIndex++;
        setTimeout(typeTerminal, 38);
      } else {
        setTimeout(() => {
          currentText = "";
          charIndex = 0;
          lineIndex = (lineIndex + 1) % lines.length;
          terminalText.textContent = "";
          typeTerminal();
        }, 650);
      }
    }

    typeTerminal();

    const loadInterval = setInterval(() => {
      const speed = progress < 74 ? Math.random() * 7 : Math.random() * 3;
      progress += speed;

      if (progress >= 100) {
        progress = 100;
        clearInterval(loadInterval);

        progressBar.style.width = "100%";
        count.textContent = "100%";

        setTimeout(() => {
          loader.classList.add("exit");
        }, 350);

        setTimeout(() => {
          loader.classList.add("hide");
          document.body.classList.add("loaded");
        }, 1300);
      }

      const cleanProgress = Math.floor(progress);
      progressBar.style.width = cleanProgress + "%";
      count.textContent = String(cleanProgress).padStart(3, "0") + "%";
    }, 120);
  </script>

</body>
</html>
