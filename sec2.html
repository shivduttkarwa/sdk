<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ouro-style Elastic Particle Hero</title>
  <style>
    :root{
      --ol-red:#ff1c08;
      --ol-white:#f4f0ee;
      --ol-black:#080808;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--ol-red);font-family:Arial, Helvetica, sans-serif;overflow-x:hidden;color:var(--ol-white)}
    body{min-height:180vh}

    .ouro-stage{
      position:relative;
      min-height:100svh;
      height:100vh;
      overflow:hidden;
      isolation:isolate;
      background:var(--ol-red);
    }

    .ouro-logo{
      position:fixed;
      top:3.8rem;
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      color:var(--ol-white);
      font-weight:950;
      font-size:clamp(1.85rem,3vw,3.05rem);
      letter-spacing:-.13em;
      line-height:1;
      pointer-events:none;
      user-select:none;
      text-transform:lowercase;
      filter:drop-shadow(0 .02em 0 rgba(0,0,0,.05));
    }

    .ouro-menu{
      position:fixed;
      top:2.4rem;
      right:2.8rem;
      z-index:20;
      display:grid;
      gap:1rem;
      text-align:right;
      font-size:clamp(1rem,1.35vw,1.45rem);
      font-weight:850;
      letter-spacing:.055em;
      line-height:.95;
      text-transform:uppercase;
      user-select:none;
    }
    .ouro-terminal{
      position:fixed;
      top:3.15rem;
      left:2.5rem;
      z-index:20;
      width:2.1rem;
      height:2.1rem;
      display:grid;
      place-items:center;
      border-radius:.18rem;
      color:var(--ol-red);
      background:var(--ol-white);
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-weight:900;
      font-size:1.35rem;
      letter-spacing:-.1em;
      box-shadow:0 0 0 .05rem rgba(255,255,255,.55);
    }

    .ouro-ring-wrap{
      position:absolute;
      inset:0;
      z-index:2;
      display:grid;
      place-items:center;
      pointer-events:none;
      opacity:.96;
    }
    #ouro-ring-canvas{
      width:min(38vw,52vh,34rem);
      height:min(38vw,52vh,34rem);
      display:block;
      filter:saturate(1.38) contrast(1.08);
    }

    .ouro-particles-wrap{
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:auto;
      cursor:crosshair;
      touch-action:none;
    }
    #ouro-particles-canvas{
      width:100%;
      height:100%;
      display:block;
    }

    .ouro-headline-wrap{
      position:absolute;
      inset:0;
      z-index:5;
      display:grid;
      place-items:center;
      pointer-events:none;
      mix-blend-mode:normal;
    }
    .ouro-headline{
      width:min(74rem,88vw);
      text-align:center;
      color:var(--ol-white);
      font-weight:250;
      letter-spacing:-.075em;
      line-height:.93;
      font-size:clamp(4.2rem,9.2vw,11.5rem);
      text-transform:uppercase;
      transform:translateY(2.4vh);
      white-space:normal;
    }
    .ouro-headline span{display:block}

    .ouro-award{
      position:fixed;
      left:1.9rem;
      bottom:1.7rem;
      z-index:15;
      width:7.9rem;
      aspect-ratio:1;
      border:.1rem solid var(--ol-white);
      border-radius:50%;
      display:grid;
      place-items:center;
      color:var(--ol-white);
      font-size:.62rem;
      font-weight:800;
      letter-spacing:.12em;
      line-height:1.1;
      text-align:center;
      transform:rotate(-18deg);
      user-select:none;
    }
    .ouro-award strong{display:block;font-size:.78rem;margin:.18rem 0;letter-spacing:.08em}

    .ouro-sound{
      position:fixed;
      right:2.3rem;
      bottom:2.1rem;
      z-index:15;
      display:flex;
      align-items:end;
      gap:.24rem;
      height:1.5rem;
    }
    .ouro-sound i{display:block;width:.25rem;background:var(--ol-white);border-radius:.2rem;opacity:.9;animation:bar 1.1s infinite ease-in-out alternate}
    .ouro-sound i:nth-child(1){height:.75rem;animation-delay:-.2s}.ouro-sound i:nth-child(2){height:1.3rem;animation-delay:-.5s}.ouro-sound i:nth-child(3){height:.95rem;animation-delay:-.1s}.ouro-sound i:nth-child(4){height:1.15rem;animation-delay:-.35s}
    @keyframes bar{to{transform:scaleY(.45);opacity:.68}}

    .dummy-scroll{
      min-height:80vh;
      background:#0a0a0a;
      color:white;
      display:grid;
      place-items:center;
      font-size:clamp(2rem,6vw,7rem);
      letter-spacing:-.06em;
      text-transform:uppercase;
    }

    @media (max-width:800px){
      .ouro-logo{top:2.2rem;font-size:2rem}
      .ouro-terminal{left:1.2rem;top:1.45rem;width:1.85rem;height:1.85rem;font-size:1.08rem}
      .ouro-menu{top:1.45rem;right:1.2rem;font-size:.95rem;gap:.72rem}
      .ouro-headline{width:94vw;font-size:clamp(3.4rem,17vw,7rem);line-height:.94;transform:translateY(1vh)}
      #ouro-ring-canvas{width:min(78vw,48vh);height:min(78vw,48vh)}
      .ouro-award{width:5.4rem;left:1rem;bottom:1rem;font-size:.46rem}
      .ouro-sound{right:1.1rem;bottom:1.1rem}
    }
  </style>
</head>
<body>
  <main class="ouro-stage" id="ouro-stage">
    <div class="ouro-terminal">&gt;_</div>
    <div class="ouro-logo">ouro labs</div>
    <nav class="ouro-menu" aria-label="Demo navigation"><div>Studio</div><div>Projects</div></nav>

    <div class="ouro-ring-wrap" aria-hidden="true">
      <canvas id="ouro-ring-canvas"></canvas>
    </div>

    <div class="ouro-particles-wrap" id="particle-zone" aria-hidden="true">
      <canvas id="ouro-particles-canvas"></canvas>
    </div>

    <div class="ouro-headline-wrap" aria-hidden="true">
      <h1 class="ouro-headline">
        <span>Where play</span>
        <span>meets curiosity</span>
        <span>and craft.</span>
      </h1>
    </div>

    <div class="ouro-award">SPECIAL DESIGN KUDOS<strong>CSSDA</strong>AWARDED</div>
    <div class="ouro-sound"><i></i><i></i><i></i><i></i></div>
  </main>
  <section class="dummy-scroll">Scroll</section>

<script>
(() => {
  const particleCanvas = document.getElementById('ouro-particles-canvas');
  const pctx = particleCanvas.getContext('2d', { alpha:true });
  const ringCanvas = document.getElementById('ouro-ring-canvas');
  const rctx = ringCanvas.getContext('2d', { alpha:true });

  const TWO_PI = Math.PI * 2;
  const TAU = TWO_PI;
  const rand = (a,b) => a + Math.random() * (b - a);
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  let W = 0, H = 0, DPR = 1, CX = 0, CY = 0;
  let count = 0;

  let homeX, homeY, x, y, vx, vy, size, alpha, spring, drag, phase, layer;

  const pointer = {
    x: 0, y: 0,
    px: 0, py: 0,
    vx: 0, vy: 0,
    energy: 0,
    lastMove: 0
  };

  function resizeCanvas(canvas, ctx, cssW, cssH){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(cssW * DPR);
    canvas.height = Math.floor(cssH * DPR);
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    CX = W * 0.5;
    CY = H * 0.525;
    resizeCanvas(particleCanvas, pctx, W, H);

    const rs = ringCanvas.getBoundingClientRect();
    resizeCanvas(ringCanvas, rctx, Math.max(260, rs.width), Math.max(260, rs.height));

    buildParticles();
  }

  function buildParticles(){
    const areaFactor = clamp((W * H) / (1440 * 820), .55, 1.35);
    count = Math.floor(4200 * areaFactor);

    homeX = new Float32Array(count); homeY = new Float32Array(count);
    x = new Float32Array(count); y = new Float32Array(count);
    vx = new Float32Array(count); vy = new Float32Array(count);
    size = new Float32Array(count); alpha = new Float32Array(count);
    spring = new Float32Array(count); drag = new Float32Array(count);
    phase = new Float32Array(count); layer = new Float32Array(count);

    const outerR = Math.min(W * 0.245, H * 0.385, 335);
    const innerR = outerR * 0.255;

    for(let i=0;i<count;i++){
      let a, r, chosen = false;
      // Rejection sampling makes the home shape more like the site's halftone torus/disk,
      // rather than a normal random cloud.
      for(let t=0;t<20 && !chosen;t++){
        a = Math.random() * TAU;
        r = Math.sqrt(Math.random()) * outerR;
        const band = .58 + .34 * Math.sin(a * 8.0 + r * .045) + .16 * Math.sin(a * 17.0 - r * .025);
        const hole = r < innerR ? 0.03 : 1;
        const edgeFade = 1 - clamp((r - outerR * .78) / (outerR * .22), 0, 1) * .42;
        const accept = clamp(band * hole * edgeFade, 0.04, 1);
        chosen = Math.random() < accept;
      }
      if(r < innerR) r = innerR + Math.random() * (outerR - innerR);

      const pinch = 1 + .055 * Math.sin(a * 5.0) + .035 * Math.cos(a * 11.0);
      const wobble = Math.sin(a * 13.0 + r * .038) * outerR * .012;
      const px = Math.cos(a) * r * pinch + Math.cos(a * 3.1) * wobble;
      const py = Math.sin(a) * r * (.965 + .035 * Math.cos(a*2.0)) + Math.sin(a * 2.6) * wobble;

      // A tiny number of particles live on the outer broken shell. They stay centered,
      // but when the pointer moves they create the same expanding smoky orbital edge.
      const shell = Math.random() < .13;
      let hx = CX + px;
      let hy = CY + py;
      if(shell){
        const rr = outerR * rand(1.03, 1.23);
        const aa = a + Math.sin(i * .41) * .05;
        hx = CX + Math.cos(aa) * rr * rand(.9, 1.02);
        hy = CY + Math.sin(aa) * rr * rand(.84, .99);
      }

      homeX[i] = hx;
      homeY[i] = hy;
      x[i] = hx + rand(-2,2);
      y[i] = hy + rand(-2,2);
      vx[i] = vy[i] = 0;
      const radial = r / outerR;
      size[i] = shell ? rand(.72, 1.45) : rand(.78, 1.95) * (0.88 + radial*.25);
      alpha[i] = shell ? rand(.58, .86) : rand(.66, .98);
      spring[i] = rand(.018, .039);
      drag[i] = rand(.855, .918);
      phase[i] = rand(0, TAU);
      layer[i] = shell ? 1.35 : rand(.75, 1.08);
    }
  }

  function onMove(e){
    const cx = e.clientX ?? (e.touches && e.touches[0].clientX) ?? CX;
    const cy = e.clientY ?? (e.touches && e.touches[0].clientY) ?? CY;
    const now = performance.now();

    const mx = cx - pointer.x;
    const my = cy - pointer.y;
    const speed = Math.hypot(mx, my);

    pointer.px = pointer.x;
    pointer.py = pointer.y;
    pointer.x = cx;
    pointer.y = cy;
    pointer.vx = mx;
    pointer.vy = my;
    pointer.energy = clamp(pointer.energy + speed / 38, 0, 1.25);
    pointer.lastMove = now;
  }

  window.addEventListener('pointermove', onMove, { passive:true });
  window.addEventListener('touchmove', onMove, { passive:true });
  window.addEventListener('resize', resize);

  function drawRing(t){
    const rect = ringCanvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    rctx.clearRect(0,0,w,h);
    const cx = w/2, cy = h/2;
    const outer = Math.min(w,h) * .49;
    const inner = outer * .25;

    rctx.save();
    rctx.beginPath();
    rctx.arc(cx, cy, outer, 0, TAU);
    rctx.arc(cx, cy, inner, 0, TAU, true);
    rctx.clip('evenodd');

    // red base haze inside the torus video plane
    const g = rctx.createRadialGradient(cx,cy,inner,cx,cy,outer);
    g.addColorStop(0,'rgba(255,35,10,.15)');
    g.addColorStop(.45,'rgba(0,225,240,.16)');
    g.addColorStop(1,'rgba(10,10,10,.28)');
    rctx.fillStyle = g;
    rctx.fillRect(0,0,w,h);

    rctx.translate(cx, cy);
    rctx.rotate(Math.sin(t*.00022)*.15 + t*.000055);
    rctx.globalCompositeOperation = 'lighter';

    for(let k=-9;k<=9;k++){
      const hue = (180 + k*13 + t*.018) % 360;
      rctx.strokeStyle = `hsla(${hue}, 95%, 54%, .78)`;
      rctx.lineWidth = Math.max(2.2, outer*.012);
      rctx.beginPath();
      for(let xx=-outer*1.45; xx<=outer*1.45; xx+=5){
        const yy = k*outer*.075 + Math.sin(xx*.032 + k*.8 + t*.0018)*outer*.12 + Math.sin(xx*.011 - t*.0012)*outer*.06;
        if(xx === -outer*1.45) rctx.moveTo(xx, yy); else rctx.lineTo(xx, yy);
      }
      rctx.stroke();
    }

    rctx.globalCompositeOperation = 'source-over';
    rctx.rotate(.85);
    for(let k=-12;k<=12;k++){
      rctx.strokeStyle = k % 2 ? 'rgba(255,25,55,.42)' : 'rgba(20,250,210,.35)';
      rctx.lineWidth = Math.max(1.4, outer*.006);
      rctx.beginPath();
      for(let yy=-outer*1.35; yy<=outer*1.35; yy+=7){
        const xx = k*outer*.058 + Math.sin(yy*.029 + k + t*.0015)*outer*.08;
        if(yy === -outer*1.35) rctx.moveTo(xx, yy); else rctx.lineTo(xx, yy);
      }
      rctx.stroke();
    }

    // subtle shadow and red center punch, matching the donut hole in the screenshots
    rctx.globalCompositeOperation = 'source-over';
    rctx.setTransform(DPR,0,0,DPR,0,0);
    rctx.beginPath();
    rctx.arc(cx,cy,inner*1.04,0,TAU);
    rctx.fillStyle = 'rgba(255,28,8,.94)';
    rctx.fill();
    rctx.restore();
  }

  function animate(t){
    drawRing(t);

    pctx.clearRect(0,0,W,H);
    pctx.fillStyle = '#050505';

    // The important part: particle force is tied to mouse movement energy.
    // When the mouse stops, energy decays, so the spring pulls every dot back home.
    pointer.energy *= .905;
    pointer.vx *= .79;
    pointer.vy *= .79;
    if(performance.now() - pointer.lastMove > 90) pointer.energy *= .86;

    const influence = clamp(Math.min(W,H) * (.24 + pointer.energy*.12), 155, 330);
    const influence2 = influence * influence;
    const energy = pointer.energy;

    pctx.beginPath();
    for(let i=0;i<count;i++){
      let dx = x[i] - pointer.x;
      let dy = y[i] - pointer.y;
      const d2 = dx*dx + dy*dy;

      if(energy > .004 && d2 < influence2){
        const d = Math.sqrt(d2) + .0001;
        const nX = dx / d;
        const nY = dy / d;
        const fall = Math.pow(1 - d / influence, 2.15) * energy;
        const tangentX = -nY;
        const tangentY = nX;

        // Elastic outward burst + orbital shear + small carry from pointer direction.
        vx[i] += nX * fall * 12.5 * layer[i];
        vy[i] += nY * fall * 12.5 * layer[i];
        vx[i] += tangentX * fall * 7.2 * layer[i];
        vy[i] += tangentY * fall * 7.2 * layer[i];
        vx[i] += pointer.vx * fall * .135;
        vy[i] += pointer.vy * fall * .135;
      }

      // A very small living wobble keeps it from looking static, but home remains centered.
      const breatheX = Math.cos(t*.001 + phase[i]) * .10;
      const breatheY = Math.sin(t*.0012 + phase[i]) * .10;
      const hx = homeX[i] + breatheX;
      const hy = homeY[i] + breatheY;

      vx[i] += (hx - x[i]) * spring[i];
      vy[i] += (hy - y[i]) * spring[i];
      vx[i] *= drag[i];
      vy[i] *= drag[i];
      x[i] += vx[i];
      y[i] += vy[i];

      const pulse = 1 + Math.sin(t*.0015 + phase[i]) * .06;
      const s = size[i] * pulse;
      pctx.moveTo(x[i] + s, y[i]);
      pctx.arc(x[i], y[i], s, 0, TAU);
    }
    pctx.globalAlpha = .94;
    pctx.fill();
    pctx.globalAlpha = 1;

    requestAnimationFrame(animate);
  }

  pointer.x = window.innerWidth/2;
  pointer.y = window.innerHeight/2;
  resize();
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
