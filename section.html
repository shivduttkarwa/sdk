<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harmony Scroll Grid Section</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      background: #101315;
      scroll-behavior: auto;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #101315;
      color: #e6e2ee;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .demo-spacer {
      min-height: 70vh;
      display: grid;
      place-items: center;
      padding: 8vw;
      background: #101315;
      color: rgba(230, 226, 238, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(0.75rem, 1vw, 1rem);
    }

    .harmony-section {
      position: relative;
      background: #101315;
      color: #e6e2ee;
      overflow: clip;
      isolation: isolate;
      cursor: none;
    }

    .harmony-section * {
      cursor: none;
    }

    .harmony-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-rows: 25vw;
      width: 100%;
      min-height: 275vw;
      background: #101315;
    }

    .harmony-cell {
      position: relative;
      grid-column: var(--col);
      grid-row: var(--row);
      width: 100%;
      height: 100%;
      overflow: visible;
      transform: translateZ(0);
      will-change: z-index;
      --focus: 0;
    }

    .tile-scaler {
      position: relative;
      width: 100%;
      height: 100%;
      transform: translate3d(0, 0, 0);
      transform-origin: var(--origin, center center);
      will-change: transform;
    }

    .tile-scaler::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 8;
      border: 1px solid rgba(222, 218, 232, 0.38);
      pointer-events: none;
      opacity: calc(0.42 + (var(--focus) * 0.45));
    }

    .tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      transform-origin: left top;
      clip-path: inset(0 calc(100% - var(--reveal, 28%)) calc(100% - var(--reveal, 28%)) 0);
      will-change: clip-path;
    }

    .tile-media,
    .tile-media img,
    .tile-media video {
      object-fit: cover;
      object-position: 0 0;
      transform: none;
      vertical-align: top;
      will-change: auto;
      filter: saturate(0.92) contrast(1.03);
    }

    .tile-inner::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.18), transparent 18%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 42%, rgba(0, 0, 0, 0.2));
      opacity: calc(0.04 + (var(--hover, 0) * 0.55));
      mix-blend-mode: screen;
      transition: opacity 0.35s ease;
    }

    .tile-canvas {
      position: absolute;
      inset: 0;
      z-index: 5;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.95;
    }

    .harmony-copy {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    .harmony-sticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .harmony-year {
      position: absolute;
      z-index: 25;
      color: #ddd8e8;
      opacity: 0.84;
      font-size: clamp(7rem, 9.6vw, 13rem);
      font-weight: 300;
      letter-spacing: -0.08em;
      line-height: 0.72;
      font-variant-numeric: tabular-nums;
      transform: translateZ(0);
      user-select: none;
    }

    .harmony-year.tl {
      top: clamp(1rem, 1.3vw, 2rem);
      left: clamp(1rem, 1.35vw, 2rem);
    }

    .harmony-year.tr {
      top: clamp(1rem, 1.3vw, 2rem);
      right: clamp(1.2rem, 1.6vw, 2.4rem);
    }

    .harmony-year.bl {
      bottom: clamp(1.5rem, 2vw, 2.8rem);
      left: clamp(1.4rem, 1.7vw, 2.8rem);
      display: flex;
      align-items: center;
      gap: clamp(0.8rem, 1.4vw, 2rem);
    }

    .harmony-year.bl::before {
      content: "";
      display: block;
      width: clamp(4.5rem, 5.8vw, 8rem);
      height: 0.09em;
      background: currentColor;
      opacity: 0.9;
    }

    .harmony-year.br {
      right: clamp(1.3rem, 1.7vw, 2.8rem);
      bottom: clamp(1.5rem, 2vw, 2.8rem);
    }

    .harmony-middle {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 26;
      transform: translate(-50%, -50%);
      color: rgba(230, 226, 238, 0.82);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", ui-monospace, monospace;
      font-size: clamp(0.66rem, 0.74vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
    }

    .harmony-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 999;
      width: 74px;
      height: 74px;
      margin-left: -37px;
      margin-top: -37px;
      border: 1px solid rgba(235, 233, 245, 0.72);
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-100px, -100px, 0) scale(0.72);
      transition: opacity 0.25s ease, border-color 0.25s ease, width 0.25s ease, height 0.25s ease, margin 0.25s ease;
      mix-blend-mode: difference;
    }

    .harmony-cursor::before,
    .harmony-cursor::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 5px;
      height: 5px;
      margin: -2.5px 0 0 -2.5px;
      border-radius: 50%;
      background: #f4f1ff;
    }

    .harmony-cursor::after {
      width: 18px;
      height: 18px;
      margin: -9px 0 0 -9px;
      background: transparent;
      border: 1px solid rgba(244, 241, 255, 0.42);
    }

    body.harmony-is-active .harmony-cursor {
      opacity: 1;
    }

    body.harmony-is-hovering .harmony-cursor {
      width: 104px;
      height: 104px;
      margin-left: -52px;
      margin-top: -52px;
      border-color: rgba(255, 255, 255, 0.92);
    }

    @media (max-width: 900px) {
      .harmony-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: 50vw;
        min-height: auto;
      }

      .harmony-cell {
        grid-column: auto !important;
        grid-row: auto !important;
      }

      .harmony-year {
        font-size: clamp(4.2rem, 18vw, 7rem);
      }

      .harmony-middle {
        top: 52%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tile-scaler,
      .tile-media img,
      .tile-media video,
      .harmony-cursor {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="demo-spacer">Scroll down to enter the section</div>

  <section class="harmony-section" id="harmonySection" aria-label="Harmony in the making scroll gallery">
    <div class="harmony-grid" id="harmonyGrid"></div>

    <div class="harmony-copy" aria-hidden="true">
      <div class="harmony-sticky">
        <span class="harmony-year tl">20</span>
        <span class="harmony-year tr">17</span>
        <span class="harmony-year bl">20</span>
        <span class="harmony-year br">26</span>
        <span class="harmony-middle">Harmony in the making</span>
      </div>
    </div>
  </section>

  <div class="demo-spacer">Section end</div>
  <div class="harmony-cursor" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

  <script>
    const mediaItems = [
      { row: 1, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/1_1_c9aa5d55d1.jpg", origin: "right bottom", innerOrigin: "left top" },
      { row: 1, col: 3, type: "image", src: "https://media.fiddle.digital/uploads/1_3_e8bf2633d3.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 2, col: 2, type: "image", src: "https://media.fiddle.digital/uploads/2_2_c1f310e9b8.jpg", origin: "right bottom", innerOrigin: "right top" },
      { row: 2, col: 4, type: "image", src: "https://media.fiddle.digital/uploads/2_2_aad2157a2a.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 3, col: 1, type: "video", src: "https://media.fiddle.digital/uploads/3_1_2e57d699c5.mp4", origin: "left bottom", innerOrigin: "left top" },
      { row: 4, col: 3, type: "image", src: "https://media.fiddle.digital/uploads/4_3_96e59cb7f9.jpg", origin: "left bottom", innerOrigin: "left top" },
      { row: 5, col: 4, type: "image", src: "https://media.fiddle.digital/uploads/5_4_faf4b34566.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 6, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/6_1_dd40b4dd5f.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 6, col: 4, type: "image", src: "https://media.fiddle.digital/uploads/6_4_8fc0f3e8a9.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 7, col: 2, type: "image", src: "https://media.fiddle.digital/uploads/7_2_8d256fb1fc.jpg", origin: "right bottom", innerOrigin: "left top" },
      { row: 7, col: 3, type: "video", src: "https://media.fiddle.digital/uploads/7_3_f07fe1e395.mp4", origin: "left bottom", innerOrigin: "right top" },
      { row: 8, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/8_1_50e2aed38a.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 9, col: 2, type: "image", src: "https://media.fiddle.digital/uploads/9_2_24d5698644.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 9, col: 4, type: "video", src: "https://media.fiddle.digital/uploads/9_4_1ca5b2b835.mp4", origin: "left bottom", innerOrigin: "left top" },
      { row: 10, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/10_1_ca4e1e5a64.jpg", origin: "left bottom", innerOrigin: "left top" },
      { row: 11, col: 3, type: "image", src: "https://media.fiddle.digital/uploads/11_3_5577a881f9.jpg", origin: "right bottom", innerOrigin: "right top" }
    ];

    const grid = document.querySelector("#harmonyGrid");

    mediaItems.forEach((item, index) => {
      const cell = document.createElement("article");
      cell.className = "harmony-cell";
      cell.style.setProperty("--row", item.row);
      cell.style.setProperty("--col", item.col);
      cell.style.setProperty("--origin", item.origin);
      cell.style.setProperty("--inner-origin", item.innerOrigin);
      cell.dataset.index = String(index + 1);

      const mediaMarkup = item.type === "video"
        ? `<video src="${item.src}" autoplay muted loop playsinline preload="metadata"></video>`
        : `<img src="${item.src}" alt="Harmony gallery visual ${index + 1}" loading="lazy" decoding="async" />`;

      cell.innerHTML = `
        <div class="tile-scaler">
          <div class="tile-inner">
            <figure class="tile-media">${mediaMarkup}</figure>
            <canvas class="tile-canvas"></canvas>
          </div>
        </div>
      `;

      grid.appendChild(cell);
    });

    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (!prefersReduced && window.Lenis) {
      const lenis = new Lenis({
        duration: 1.18,
        lerp: 0.08,
        smoothWheel: true,
        wheelMultiplier: 0.86,
        touchMultiplier: 1.2
      });

      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }

      requestAnimationFrame(raf);
    }

    const tiles = [...document.querySelectorAll(".harmony-cell")].map((cell) => ({
      cell,
      scaler: cell.querySelector(".tile-scaler"),
      inner: cell.querySelector(".tile-inner"),
      media: cell.querySelector("img, video"),
      y: 0,
      rotate: 0,
      reveal: 28,
      focus: 0
    }));

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function smootherstep(value) {
      const x = clamp(value, 0, 1);
      return x * x * x * (x * (x * 6 - 15) + 10);
    }

    function animateScrollTiles() {
      const vh = window.innerHeight || 1;
      const vw = window.innerWidth || 1;
      const isMobile = vw < 900;
      const minReveal = isMobile ? 44 : 28;
      const maxReveal = 100;
      const focusDistance = vh * 0.42;

      tiles.forEach((tile) => {
        const rect = tile.cell.getBoundingClientRect();
        const center = rect.top + rect.height * 0.5;
        const distance = Math.abs(center - vh * 0.5);

        let focus = 1 - distance / focusDistance;
        focus = smootherstep(focus);

        const viewportProgress = clamp((vh - rect.top) / (vh + rect.height), 0, 1);
        const targetReveal = minReveal + (maxReveal - minReveal) * focus;
        const targetY = (0.5 - viewportProgress) * 90 * (1 - focus * 0.25);
        const targetRotate = ((viewportProgress - 0.5) * 2) * (1 - focus) * 0.35;

        const lerp = 0.12;
        tile.reveal += (targetReveal - tile.reveal) * lerp;
        tile.y += (targetY - tile.y) * lerp;
        tile.rotate += (targetRotate - tile.rotate) * lerp;
        tile.focus += (focus - tile.focus) * lerp;

        tile.cell.style.setProperty("--focus", tile.focus.toFixed(3));
        tile.cell.style.zIndex = String(Math.round(10 + tile.focus * 90));
        tile.scaler.style.transform = `translate3d(0, ${tile.y.toFixed(2)}px, 0) rotate(${tile.rotate.toFixed(3)}deg)`;
        tile.inner.style.setProperty("--reveal", `${tile.reveal.toFixed(2)}%`);
      });

      requestAnimationFrame(animateScrollTiles);
    }

    animateScrollTiles();

    const cursor = document.querySelector(".harmony-cursor");
    const cursorX = gsap.quickTo(cursor, "x", { duration: 0.32, ease: "power3.out" });
    const cursorY = gsap.quickTo(cursor, "y", { duration: 0.32, ease: "power3.out" });
    const cursorScale = gsap.quickTo(cursor, "scale", { duration: 0.28, ease: "power3.out" });

    window.addEventListener("pointermove", (event) => {
      cursorX(event.clientX);
      cursorY(event.clientY);
    });

    const harmonySection = document.querySelector("#harmonySection");

    harmonySection.addEventListener("pointerenter", () => {
      document.body.classList.add("harmony-is-active");
      cursorScale(1);
    });

    harmonySection.addEventListener("pointerleave", () => {
      document.body.classList.remove("harmony-is-active", "harmony-is-hovering");
      cursorScale(0.72);
    });

    function setupCanvasCursor(cell) {
      const canvas = cell.querySelector("canvas");
      const ctx = canvas.getContext("2d");
      const inner = cell.querySelector(".tile-inner");

      let rect = inner.getBoundingClientRect();
      let dpr = Math.min(window.devicePixelRatio || 1, 2);
      let targetX = rect.width * 0.5;
      let targetY = rect.height * 0.5;
      let x = targetX;
      let y = targetY;
      let active = 0;
      let alpha = 0;
      let tick = Math.random() * 1000;

      function resize() {
        rect = inner.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      resize();
      const resizeObserver = new ResizeObserver(resize);
      resizeObserver.observe(inner);

      inner.addEventListener("pointerenter", () => {
        active = 1;
        document.body.classList.add("harmony-is-hovering");
      });

      inner.addEventListener("pointerleave", () => {
        active = 0;
        inner.style.setProperty("--hover", "0");
        document.body.classList.remove("harmony-is-hovering");
      });

      inner.addEventListener("pointermove", (event) => {
        rect = inner.getBoundingClientRect();
        targetX = event.clientX - rect.left;
        targetY = event.clientY - rect.top;
        inner.style.setProperty("--mx", `${(targetX / rect.width) * 100}%`);
        inner.style.setProperty("--my", `${(targetY / rect.height) * 100}%`);
        inner.style.setProperty("--hover", "1");
      });

      function draw() {
        requestAnimationFrame(draw);

        tick += 0.012;
        x += (targetX - x) * 0.12;
        y += (targetY - y) * 0.12;
        alpha += (active - alpha) * 0.08;

        ctx.clearRect(0, 0, rect.width, rect.height);

        if (alpha < 0.01) return;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(232, 244, 255, 0.82)";
        ctx.fillStyle = "rgba(232, 244, 255, 0.78)";

        for (let ring = 0; ring < 3; ring++) {
          ctx.beginPath();
          const radius = 26 + ring * 15 + Math.sin(tick + ring) * 5;
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (let i = 0; i < 28; i++) {
          const angle = i * 2.399 + tick * 0.75;
          const radius = 12 + (i % 9) * 7 + Math.sin(tick + i) * 8;
          const px = x + Math.cos(angle) * radius;
          const py = y + Math.sin(angle) * radius;
          const size = 1 + ((i % 4) * 0.35);
          ctx.globalAlpha = alpha * (0.25 + (i % 5) * 0.11);
          ctx.beginPath();
          ctx.arc(px, py, size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      draw();
    }

    document.querySelectorAll(".harmony-cell").forEach(setupCanvasCursor);
  </script>
</body>

      left: clamp(1.4rem, 1.7vw, 2.8rem);
      display: flex;
      align-items: center;
      gap: clamp(0.8rem, 1.4vw, 2rem);
    }

    .harmony-year.bl::before {
      content: "";
      display: block;
      width: clamp(4.5rem, 5.8vw, 8rem);
      height: 0.09em;
      background: currentColor;
      opacity: 0.9;
    }

    .harmony-year.br {
      right: clamp(1.3rem, 1.7vw, 2.8rem);
      bottom: clamp(1.5rem, 2vw, 2.8rem);
    }

    .harmony-middle {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 26;
      transform: translate(-50%, -50%);
      color: rgba(230, 226, 238, 0.82);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", ui-monospace, monospace;
      font-size: clamp(0.66rem, 0.74vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
    }

    .harmony-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 999;
      width: 74px;
      height: 74px;
      margin-left: -37px;
      margin-top: -37px;
      border: 1px solid rgba(235, 233, 245, 0.72);
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-100px, -100px, 0) scale(0.72);
      transition: opacity 0.25s ease, border-color 0.25s ease, width 0.25s ease, height 0.25s ease, margin 0.25s ease;
      mix-blend-mode: difference;
    }

    .harmony-cursor::before,
    .harmony-cursor::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 5px;
      height: 5px;
      margin: -2.5px 0 0 -2.5px;
      border-radius: 50%;
      background: #f4f1ff;
    }

    .harmony-cursor::after {
      width: 18px;
      height: 18px;
      margin: -9px 0 0 -9px;
      background: transparent;
      border: 1px solid rgba(244, 241, 255, 0.42);
    }

    body.harmony-is-active .harmony-cursor {
      opacity: 1;
    }

    body.harmony-is-hovering .harmony-cursor {
      width: 104px;
      height: 104px;
      margin-left: -52px;
      margin-top: -52px;
      border-color: rgba(255, 255, 255, 0.92);
    }

    @media (max-width: 900px) {
      .harmony-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: 50vw;
        min-height: auto;
      }

      .harmony-cell {
        grid-column: auto !important;
        grid-row: auto !important;
      }

      .harmony-year {
        font-size: clamp(4.2rem, 18vw, 7rem);
      }

      .harmony-middle {
        top: 52%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tile-scaler,
      .tile-media img,
      .tile-media video,
      .harmony-cursor {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="demo-spacer">Scroll down to enter the section</div>

  <section class="harmony-section" id="harmonySection" aria-label="Harmony in the making scroll gallery">
    <div class="harmony-grid" id="harmonyGrid"></div>

    <div class="harmony-copy" aria-hidden="true">
      <div class="harmony-sticky">
        <span class="harmony-year tl">20</span>
        <span class="harmony-year tr">17</span>
        <span class="harmony-year bl">20</span>
        <span class="harmony-year br">26</span>
        <span class="harmony-middle">Harmony in the making</span>
      </div>
    </div>
  </section>

  <div class="demo-spacer">Section end</div>
  <div class="harmony-cursor" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

  <script>
    const mediaItems = [
      { row: 1, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/1_1_c9aa5d55d1.jpg", origin: "right bottom", innerOrigin: "left top" },
      { row: 1, col: 3, type: "image", src: "https://media.fiddle.digital/uploads/1_3_e8bf2633d3.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 2, col: 2, type: "image", src: "https://media.fiddle.digital/uploads/2_2_c1f310e9b8.jpg", origin: "right bottom", innerOrigin: "right top" },
      { row: 2, col: 4, type: "image", src: "https://media.fiddle.digital/uploads/2_2_aad2157a2a.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 3, col: 1, type: "video", src: "https://media.fiddle.digital/uploads/3_1_2e57d699c5.mp4", origin: "left bottom", innerOrigin: "left top" },
      { row: 4, col: 3, type: "image", src: "https://media.fiddle.digital/uploads/4_3_96e59cb7f9.jpg", origin: "left bottom", innerOrigin: "left top" },
      { row: 5, col: 4, type: "image", src: "https://media.fiddle.digital/uploads/5_4_faf4b34566.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 6, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/6_1_dd40b4dd5f.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 6, col: 4, type: "image", src: "https://media.fiddle.digital/uploads/6_4_8fc0f3e8a9.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 7, col: 2, type: "image", src: "https://media.fiddle.digital/uploads/7_2_8d256fb1fc.jpg", origin: "right bottom", innerOrigin: "left top" },
      { row: 7, col: 3, type: "video", src: "https://media.fiddle.digital/uploads/7_3_f07fe1e395.mp4", origin: "left bottom", innerOrigin: "right top" },
      { row: 8, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/8_1_50e2aed38a.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 9, col: 2, type: "image", src: "https://media.fiddle.digital/uploads/9_2_24d5698644.jpg", origin: "left bottom", innerOrigin: "right top" },
      { row: 9, col: 4, type: "video", src: "https://media.fiddle.digital/uploads/9_4_1ca5b2b835.mp4", origin: "left bottom", innerOrigin: "left top" },
      { row: 10, col: 1, type: "image", src: "https://media.fiddle.digital/uploads/10_1_ca4e1e5a64.jpg", origin: "left bottom", innerOrigin: "left top" },
      { row: 11, col: 3, type: "image", src: "https://media.fiddle.digital/uploads/11_3_5577a881f9.jpg", origin: "right bottom", innerOrigin: "right top" }
    ];

    const grid = document.querySelector("#harmonyGrid");

    mediaItems.forEach((item, index) => {
      const cell = document.createElement("article");
      cell.className = "harmony-cell";
      cell.style.setProperty("--row", item.row);
      cell.style.setProperty("--col", item.col);
      cell.style.setProperty("--origin", item.origin);
      cell.style.setProperty("--inner-origin", item.innerOrigin);
      cell.dataset.index = String(index + 1);

      const mediaMarkup = item.type === "video"
        ? `<video src="${item.src}" autoplay muted loop playsinline preload="metadata"></video>`
        : `<img src="${item.src}" alt="Harmony gallery visual ${index + 1}" loading="lazy" decoding="async" />`;

      cell.innerHTML = `
        <div class="tile-scaler">
          <div class="tile-inner">
            <figure class="tile-media">${mediaMarkup}</figure>
            <canvas class="tile-canvas"></canvas>
          </div>
        </div>
      `;

      grid.appendChild(cell);
    });

    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (!prefersReduced && window.Lenis) {
      const lenis = new Lenis({
        duration: 1.18,
        lerp: 0.08,
        smoothWheel: true,
        wheelMultiplier: 0.86,
        touchMultiplier: 1.2
      });

      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }

      requestAnimationFrame(raf);
    }

    const tiles = [...document.querySelectorAll(".harmony-cell")].map((cell) => ({
      cell,
      scaler: cell.querySelector(".tile-scaler"),
      inner: cell.querySelector(".tile-inner"),
      media: cell.querySelector("img, video"),
      y: 0,
      rotate: 0,
      reveal: 28,
      focus: 0
    }));

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function smootherstep(value) {
      const x = clamp(value, 0, 1);
      return x * x * x * (x * (x * 6 - 15) + 10);
    }

    function animateScrollTiles() {
      const vh = window.innerHeight || 1;
      const vw = window.innerWidth || 1;
      const isMobile = vw < 900;
      const minReveal = isMobile ? 44 : 28;
      const maxReveal = 100;
      const focusDistance = vh * 0.42;

      tiles.forEach((tile) => {
        const rect = tile.cell.getBoundingClientRect();
        const center = rect.top + rect.height * 0.5;
        const distance = Math.abs(center - vh * 0.5);

        let focus = 1 - distance / focusDistance;
        focus = smootherstep(focus);

        const viewportProgress = clamp((vh - rect.top) / (vh + rect.height), 0, 1);
        const targetReveal = minReveal + (maxReveal - minReveal) * focus;
        const targetY = (0.5 - viewportProgress) * 90 * (1 - focus * 0.25);
        const targetRotate = ((viewportProgress - 0.5) * 2) * (1 - focus) * 0.35;

        const lerp = 0.12;
        tile.reveal += (targetReveal - tile.reveal) * lerp;
        tile.y += (targetY - tile.y) * lerp;
        tile.rotate += (targetRotate - tile.rotate) * lerp;
        tile.focus += (focus - tile.focus) * lerp;

        tile.cell.style.setProperty("--focus", tile.focus.toFixed(3));
        tile.cell.style.zIndex = String(Math.round(10 + tile.focus * 90));
        tile.scaler.style.transform = `translate3d(0, ${tile.y.toFixed(2)}px, 0) rotate(${tile.rotate.toFixed(3)}deg)`;
        tile.inner.style.setProperty("--reveal", `${tile.reveal.toFixed(2)}%`);
      });

      requestAnimationFrame(animateScrollTiles);
    }

    animateScrollTiles();

    const cursor = document.querySelector(".harmony-cursor");
    const cursorX = gsap.quickTo(cursor, "x", { duration: 0.32, ease: "power3.out" });
    const cursorY = gsap.quickTo(cursor, "y", { duration: 0.32, ease: "power3.out" });
    const cursorScale = gsap.quickTo(cursor, "scale", { duration: 0.28, ease: "power3.out" });

    window.addEventListener("pointermove", (event) => {
      cursorX(event.clientX);
      cursorY(event.clientY);
    });

    const harmonySection = document.querySelector("#harmonySection");

    harmonySection.addEventListener("pointerenter", () => {
      document.body.classList.add("harmony-is-active");
      cursorScale(1);
    });

    harmonySection.addEventListener("pointerleave", () => {
      document.body.classList.remove("harmony-is-active", "harmony-is-hovering");
      cursorScale(0.72);
    });

    function setupCanvasCursor(cell) {
      const canvas = cell.querySelector("canvas");
      const ctx = canvas.getContext("2d");
      const inner = cell.querySelector(".tile-inner");

      let rect = inner.getBoundingClientRect();
      let dpr = Math.min(window.devicePixelRatio || 1, 2);
      let targetX = rect.width * 0.5;
      let targetY = rect.height * 0.5;
      let x = targetX;
      let y = targetY;
      let active = 0;
      let alpha = 0;
      let tick = Math.random() * 1000;

      function resize() {
        rect = inner.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      resize();
      const resizeObserver = new ResizeObserver(resize);
      resizeObserver.observe(inner);

      inner.addEventListener("pointerenter", () => {
        active = 1;
        document.body.classList.add("harmony-is-hovering");
      });

      inner.addEventListener("pointerleave", () => {
        active = 0;
        inner.style.setProperty("--hover", "0");
        document.body.classList.remove("harmony-is-hovering");
      });

      inner.addEventListener("pointermove", (event) => {
        rect = inner.getBoundingClientRect();
        targetX = event.clientX - rect.left;
        targetY = event.clientY - rect.top;
        inner.style.setProperty("--mx", `${(targetX / rect.width) * 100}%`);
        inner.style.setProperty("--my", `${(targetY / rect.height) * 100}%`);
        inner.style.setProperty("--hover", "1");
      });

      function draw() {
        requestAnimationFrame(draw);

        tick += 0.012;
        x += (targetX - x) * 0.12;
        y += (targetY - y) * 0.12;
        alpha += (active - alpha) * 0.08;

        ctx.clearRect(0, 0, rect.width, rect.height);

        if (alpha < 0.01) return;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(232, 244, 255, 0.82)";
        ctx.fillStyle = "rgba(232, 244, 255, 0.78)";

        for (let ring = 0; ring < 3; ring++) {
          ctx.beginPath();
          const radius = 26 + ring * 15 + Math.sin(tick + ring) * 5;
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (let i = 0; i < 28; i++) {
          const angle = i * 2.399 + tick * 0.75;
          const radius = 12 + (i % 9) * 7 + Math.sin(tick + i) * 8;
          const px = x + Math.cos(angle) * radius;
          const py = y + Math.sin(angle) * radius;
          const size = 1 + ((i % 4) * 0.35);
          ctx.globalAlpha = alpha * (0.25 + (i % 5) * 0.11);
          ctx.beginPath();
          ctx.arc(px, py, size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      draw();
    }

    document.querySelectorAll(".harmony-cell").forEach(setupCanvasCursor);
  </script>
</body>
</html>
