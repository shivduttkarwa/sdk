<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Featured Works Section</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #efeee8;
      --black: #050505;
      --dark: #2d2d2d;
      --cream: #f4f2ea;
      --text: #050505;
      --blue: #4a84d8;
      --red: #f23a35;
      --pad: clamp(1rem, 2vw, 2.35rem);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .dummy-space {
      min-height: 40vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ================================
       FEATURED WORKS SECTION
    ================================= */
    .jg-featured {
      width: 100%;
      background: var(--bg);
      padding: clamp(1.5rem, 3vw, 2.5rem) var(--pad) clamp(3rem, 6vw, 6rem);
      overflow: hidden;
    }

    .jg-featured__inner {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .jg-title-wrap {
      overflow: hidden;
      width: 100%;
    }

    .jg-title {
      font-family: "Anton", Impact, sans-serif;
      font-size: clamp(4.8rem, 18vw, 21rem);
      line-height: 0.82;
      letter-spacing: -0.045em;
      font-weight: 900;
      color: var(--black);
      text-transform: uppercase;
      white-space: nowrap;
      transform-origin: left bottom;
    }

    .jg-title .char-wrap {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
    }

    .jg-title .char {
      display: inline-block;
      transform: translateY(115%);
      will-change: transform;
    }

    .jg-meta {
      margin-top: clamp(1.6rem, 3vw, 3rem);
    }

    .jg-line {
      width: 100%;
      height: 0.09rem;
      background: var(--black);
      transform: scaleX(0);
      transform-origin: left center;
    }

    .jg-meta-row {
      padding-top: clamp(1rem, 1.8vw, 1.4rem);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .jg-kicker {
      font-size: clamp(0.8rem, 1.1vw, 1rem);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      overflow: hidden;
    }

    .jg-kicker span {
      display: block;
      transform: translateY(110%);
    }

    .jg-top-tags {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .jg-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.6rem;
      padding: 0.18rem 0.82rem 0.16rem;
      border-radius: 999rem;
      background: var(--black);
      color: var(--cream);
      font-size: clamp(0.72rem, 0.95vw, 0.95rem);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      transform: translateY(120%);
      opacity: 0;
    }

    /* ================================
       GRID
    ================================= */
    .jg-work-grid {
      margin-top: clamp(4.5rem, 9vw, 8rem);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(1.8rem, 3vw, 3.7rem);
      align-items: start;
    }

    .jg-card {
      position: relative;
      display: block;
      min-height: clamp(26rem, 55vw, 54rem);
      overflow: hidden;
      background: #d9d6cd;
      color: #fff;
      opacity: 0;
      transform: translateY(5rem);
      cursor: pointer;
    }

    .jg-card--wide {
      grid-column: 1 / -1;
      min-height: clamp(28rem, 54vw, 55rem);
    }

    .jg-card--small {
      min-height: clamp(24rem, 43vw, 43rem);
    }

    .jg-card__media {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #ddd;
    }

    .jg-card__image,
    .jg-card__video {
      position: absolute;
      inset: -8%;
      width: 116%;
      height: 116%;
      object-fit: cover;
      transform: scale(1.04);
      will-change: transform;
    }

    .jg-card__video {
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(.22, 1, .36, 1);
      z-index: 2;
    }

    .jg-card:hover .jg-card__video {
      opacity: 1;
    }

    .jg-card__shade {
      position: absolute;
      inset: auto 0 0;
      height: 42%;
      background: linear-gradient(to top, rgba(0,0,0,0.52), transparent);
      z-index: 3;
      pointer-events: none;
    }

    .jg-card__info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 4;
      min-height: clamp(4.5rem, 6vw, 5.8rem);
      padding: 0 clamp(1rem, 1.5vw, 1.6rem);
      background: var(--dark);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: clamp(0.75rem, 1.5vw, 1.25rem);
      transform: translateY(0);
    }

    .jg-number {
      display: inline-flex;
      align-items: baseline;
      font-family: "Anton", Impact, sans-serif;
      font-size: clamp(1.75rem, 2.6vw, 3.05rem);
      line-height: 0.8;
      letter-spacing: -0.04em;
      color: #fff;
      min-width: clamp(2.5rem, 3.2vw, 3.3rem);
      text-shadow: 0.08rem 0 var(--blue), -0.04rem 0 var(--red);
    }

    .jg-card__title {
      font-size: clamp(0.85rem, 1vw, 1.05rem);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      color: #fff;
      letter-spacing: -0.04em;
    }

    .jg-card__tags {
      display: flex;
      justify-content: flex-end;
      gap: clamp(0.45rem, 0.85vw, 0.85rem);
      flex-wrap: wrap;
    }

    .jg-term {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.23rem 0.82rem 0.2rem;
      border-radius: 999rem;
      background: #f5f3eb;
      color: #050505;
      font-size: clamp(0.68rem, 0.92vw, 0.92rem);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.045em;
      white-space: nowrap;
    }

    .jg-card:hover .jg-card__image,
    .jg-card:hover .jg-card__video {
      transform: scale(1.1);
    }

    .jg-card__image,
    .jg-card__video {
      transition: transform 1.1s cubic-bezier(.16, 1, .3, 1);
    }

    /* ================================
       CTA
    ================================= */
    .jg-cta-wrap {
      display: flex;
      justify-content: center;
      padding-top: clamp(3rem, 6vw, 6rem);
    }

    .jg-cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: clamp(3.1rem, 4vw, 4.1rem);
      padding: 0 clamp(1.5rem, 3vw, 3rem);
      border-radius: 999rem;
      background: var(--black);
      color: #fff;
      font-size: clamp(0.95rem, 1.2vw, 1.15rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      overflow: hidden;
      transform: translateY(2rem);
      opacity: 0;
    }

    .jg-cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #fff;
      transform: translateY(105%);
      transition: transform 0.45s cubic-bezier(.16, 1, .3, 1);
    }

    .jg-cta span {
      position: relative;
      z-index: 2;
      transition: color 0.35s ease;
    }

    .jg-cta:hover::before {
      transform: translateY(0);
    }

    .jg-cta:hover span {
      color: #000;
    }

    /* ================================
       RESPONSIVE
    ================================= */
    @media (max-width: 1200px) {
      .jg-title {
        font-size: clamp(4.5rem, 17vw, 13rem);
      }
    }

    @media (max-width: 900px) {
      .jg-meta-row {
        flex-direction: column;
        gap: 1.2rem;
      }

      .jg-top-tags {
        justify-content: flex-start;
      }

      .jg-work-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-top: 3rem;
      }

      .jg-card,
      .jg-card--wide,
      .jg-card--small {
        grid-column: 1 / -1;
        min-height: 32rem;
      }

      .jg-card__info {
        grid-template-columns: auto 1fr;
        align-items: center;
      }

      .jg-card__tags {
        grid-column: 1 / -1;
        justify-content: flex-start;
        padding-bottom: 0.9rem;
      }
    }

    @media (max-width: 600px) {
      .jg-featured {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .jg-title {
        font-size: clamp(3.4rem, 18vw, 6rem);
        white-space: normal;
        line-height: 0.86;
      }

      .jg-card,
      .jg-card--wide,
      .jg-card--small {
        min-height: 27rem;
      }

      .jg-card__info {
        min-height: auto;
        padding-top: 1rem;
      }

      .jg-term {
        font-size: 0.68rem;
        padding-inline: 0.7rem;
      }
    }
  </style>
</head>

<body>

  <section class="dummy-space">
    Scroll Down
  </section>

  <section class="jg-featured">
    <div class="jg-featured__inner">

      <div class="jg-title-wrap">
        <h2 class="jg-title" data-split>Featured Works</h2>
      </div>

      <div class="jg-meta">
        <div class="jg-line"></div>

        <div class="jg-meta-row">
          <div class="jg-kicker">
            <span>Design Insights</span>
          </div>

          <div class="jg-top-tags">
            <span class="jg-pill">Conceptual</span>
            <span class="jg-pill">Expressive</span>
            <span class="jg-pill">Immersive</span>
          </div>
        </div>
      </div>

      <div class="jg-work-grid">

        <!-- 01 -->
        <a href="#" class="jg-card jg-card--wide">
          <div class="jg-card__media">
            <img
              class="jg-card__image"
              src="https://jasminegunarto.com/wp-content/uploads/2026/01/hotpot_styleframe18-1.webp"
              alt="Home in a Hot Pot"
            />
            <video
              class="jg-card__video"
              src="https://jasminegunarto.com/wp-content/uploads/2025/09/f-hotpot.mp4"
              autoplay muted loop playsinline
            ></video>
          </div>

          <div class="jg-card__shade"></div>

          <div class="jg-card__info">
            <div class="jg-number">01</div>
            <h3 class="jg-card__title">Home in a Hot Pot</h3>

            <div class="jg-card__tags">
              <span class="jg-term">Concept</span>
              <span class="jg-term">Design</span>
              <span class="jg-term">Motion</span>
            </div>
          </div>
        </a>

        <!-- 02 -->
        <a href="#" class="jg-card jg-card--small">
          <div class="jg-card__media">
            <img
              class="jg-card__image"
              src="https://jasminegunarto.com/wp-content/uploads/2026/01/flow_stickers-scaled-2.webp"
              alt="FLOW"
            />
          </div>

          <div class="jg-card__shade"></div>

          <div class="jg-card__info">
            <div class="jg-number">02</div>
            <h3 class="jg-card__title">FLOW</h3>

            <div class="jg-card__tags">
              <span class="jg-term">Art Direction</span>
              <span class="jg-term">Concept</span>
              <span class="jg-term">Design</span>
            </div>
          </div>
        </a>

        <!-- 03 -->
        <a href="#" class="jg-card jg-card--small">
          <div class="jg-card__media">
            <img
              class="jg-card__image"
              src="https://jasminegunarto.com/wp-content/uploads/2026/01/precollege_still-scaled-1.webp"
              alt="PreCollege"
            />
            <video
              class="jg-card__video"
              src="https://jasminegunarto.com/wp-content/uploads/2025/12/f-precollege.mp4"
              autoplay muted loop playsinline
            ></video>
          </div>

          <div class="jg-card__shade"></div>

          <div class="jg-card__info">
            <div class="jg-number">03</div>
            <h3 class="jg-card__title">PreCollege ’25</h3>

            <div class="jg-card__tags">
              <span class="jg-term">Concept</span>
              <span class="jg-term">Design</span>
              <span class="jg-term">Motion</span>
            </div>
          </div>
        </a>

        <!-- 04 -->
        <a href="#" class="jg-card jg-card--wide">
          <div class="jg-card__media">
            <img
              class="jg-card__image"
              src="https://jasminegunarto.com/wp-content/uploads/2026/01/jgunarto_p03_Frame08-1.webp"
              alt="The Taste Gap"
            />
          </div>

          <div class="jg-card__shade"></div>

          <div class="jg-card__info">
            <div class="jg-number">04</div>
            <h3 class="jg-card__title">The Taste Gap</h3>

            <div class="jg-card__tags">
              <span class="jg-term">Concept</span>
              <span class="jg-term">Design</span>
              <span class="jg-term">Motion</span>
            </div>
          </div>
        </a>

      </div>

      <div class="jg-cta-wrap">
        <a href="#" class="jg-cta">
          <span>See All Work</span>
        </a>
      </div>

    </div>
  </section>

  <section class="dummy-space">
    Next Section
  </section>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* Split title into wrapped characters */
    const title = document.querySelector("[data-split]");
    const originalText = title.textContent.trim();

    title.innerHTML = originalText
      .split("")
      .map((char) => {
        if (char === " ") return `<span style="display:inline-block;width:0.18em"></span>`;
        return `
          <span class="char-wrap">
            <span class="char">${char}</span>
          </span>
        `;
      })
      .join("");

    /* Intro animation */
    const introTl = gsap.timeline({
      scrollTrigger: {
        trigger: ".jg-featured",
        start: "top 72%",
        once: true
      }
    });

    introTl
      .to(".jg-title .char", {
        y: 0,
        duration: 1.15,
        stagger: 0.025,
        ease: "power4.out"
      })
      .to(".jg-line", {
        scaleX: 1,
        duration: 1.1,
        ease: "power4.inOut"
      }, "-=0.55")
      .to(".jg-kicker span", {
        y: 0,
        duration: 0.85,
        ease: "power4.out"
      }, "-=0.65")
      .to(".jg-pill", {
        y: 0,
        opacity: 1,
        duration: 0.8,
        stagger: 0.08,
        ease: "power4.out"
      }, "-=0.7");

    /* Card reveal */
    gsap.utils.toArray(".jg-card").forEach((card, index) => {
      gsap.to(card, {
        y: 0,
        opacity: 1,
        duration: 1.1,
        ease: "power4.out",
        scrollTrigger: {
          trigger: card,
          start: "top 82%",
          once: true
        },
        delay: index * 0.04
      });
    });

    /* Smooth image parallax inside cards */
    gsap.utils.toArray(".jg-card").forEach((card) => {
      const media = card.querySelector(".jg-card__image");
      const video = card.querySelector(".jg-card__video");

      gsap.fromTo(
        media,
        { yPercent: -7 },
        {
          yPercent: 7,
          ease: "none",
          scrollTrigger: {
            trigger: card,
            start: "top bottom",
            end: "bottom top",
            scrub: 1.2
          }
        }
      );

      if (video) {
        gsap.fromTo(
          video,
          { yPercent: -7 },
          {
            yPercent: 7,
            ease: "none",
            scrollTrigger: {
              trigger: card,
              start: "top bottom",
              end: "bottom top",
              scrub: 1.2
            }
          }
        );
      }
    });

    /* Button reveal */
    gsap.to(".jg-cta", {
      y: 0,
      opacity: 1,
      duration: 0.9,
      ease: "power4.out",
      scrollTrigger: {
        trigger: ".jg-cta-wrap",
        start: "top 88%",
        once: true
      }
    });

    /* Magnetic CTA effect */
    const cta = document.querySelector(".jg-cta");

    cta.addEventListener("mousemove", (e) => {
      const rect = cta.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;

      gsap.to(cta, {
        x: x * 0.18,
        y: y * 0.18,
        duration: 0.35,
        ease: "power3.out"
      });
    });

    cta.addEventListener("mouseleave", () => {
      gsap.to(cta, {
        x: 0,
        y: 0,
        duration: 0.55,
        ease: "elastic.out(1, 0.45)"
      });
    });
  </script>

</body>
</html>
