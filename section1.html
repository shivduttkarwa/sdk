<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shivdutt Karwa — Pinned Portfolio Reveal</title>

  <!-- Modern font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --skw-yellow: #fff200;
      --skw-black: #070707;
      --skw-white: #ffffff;
      --skw-muted: #b9b9b9;
      --skw-page: #f7f7f4;
      --skw-max: 78.5vw;
      --skw-header-h: 8.8rem;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: auto;
      font-size: 16px;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--skw-white);
      color: var(--skw-black);
      overflow-x: hidden;
      cursor: none;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Custom yellow cursor dot like the reference */
    .skw-cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      background: var(--skw-yellow);
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: normal;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease, opacity 0.25s ease;
    }

    .skw-cursor-dot.is-small {
      width: 2.7rem;
      height: 2.7rem;
    }

    /* Header */
    .skw-header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--skw-header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 3.95rem;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(0.625rem);
      z-index: 1000;
    }

    .skw-smile-logo {
      position: relative;
      width: 5.95rem;
      aspect-ratio: 1 / 1;
      background: var(--skw-yellow);
      border: 0.25rem solid var(--skw-black);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .skw-smile-logo::after {
      content: "";
      width: 3.15rem;
      height: 1.7rem;
      border: 0.25rem solid var(--skw-black);
      border-top: 0;
      border-radius: 0 0 4rem 4rem;
      transform: translateY(0.65rem);
    }

    .skw-header-right {
      display: flex;
      align-items: center;
      gap: 3.9rem;
    }

    .skw-languages {
      display: flex;
      gap: 0.55rem;
      font-size: 1.45rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.08em;
    }

    .skw-languages span:nth-child(1) { color: var(--skw-black); }
    .skw-languages span:nth-child(2),
    .skw-languages span:nth-child(3) { color: #bdbdbd; }

    .skw-menu-btn {
      width: 3.2rem;
      height: 2.55rem;
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: none;
    }

    .skw-menu-btn span {
      display: block;
      width: 100%;
      height: 0.2rem;
      background: var(--skw-black);
      transform-origin: right center;
      transition: transform 0.3s ease;
    }

    .skw-menu-btn:hover span:nth-child(1) { transform: scaleX(0.68); }
    .skw-menu-btn:hover span:nth-child(2) { transform: scaleX(0.9); }
    .skw-menu-btn:hover span:nth-child(3) { transform: scaleX(0.72); }

    /* Intro */
    .skw-hero-spacer {
      min-height: 29vh;
      background: linear-gradient(90deg, #fff 0%, #eeeeeb 48%, #f8f8f6 100%);
    }

    .skw-mini-top-image {
      width: 20.2vw;
      min-width: 17rem;
      height: 4.2rem;
      margin-left: 54.2vw;
      margin-top: calc(var(--skw-header-h) + 0.7rem);
      overflow: hidden;
    }

    .skw-mini-top-image img {
      object-position: center 54%;
    }

    /* Portfolio */
    .skw-portfolio {
      position: relative;
      background: var(--skw-white);
      padding-bottom: 0;
    }

    .skw-project {
      position: relative;
      min-height: 265vh;
      background: var(--skw-white);
    }

    .skw-project-stage {
      position: relative;
      height: 100vh;
      min-height: 45rem;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding-top: var(--skw-header-h);
      background: var(--skw-white);
      isolation: isolate;
    }

    .skw-project-link {
      position: absolute;
      inset: 0;
      z-index: 30;
      cursor: none;
    }

    .skw-brand-mark {
      position: absolute;
      left: 50%;
      top: 7.8rem;
      width: min(59vw, 58rem);
      height: 33vh;
      min-height: 15rem;
      transform: translateX(-50%);
      z-index: 1;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0.96;
    }

    .skw-brand-mark img {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: contrast(1.05);
    }

    .skw-word-logo {
      font-size: clamp(4.6rem, 12vw, 14rem);
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: -0.1em;
      text-transform: uppercase;
      color: var(--skw-black);
      text-align: center;
      white-space: nowrap;
    }

    .skw-featured-wrap {
      position: relative;
      width: var(--skw-max);
      height: clamp(30rem, 66vh, 43.5rem);
      margin-top: 1.5rem;
      z-index: 3;
      overflow: hidden;
      background: #ddd;
      will-change: transform;
    }

    .skw-featured-wrap img {
      transform: scale(1.06);
      will-change: transform;
    }

    .skw-project-caption {
      position: absolute;
      left: calc((100vw - var(--skw-max)) / 2 + 9.6vw);
      bottom: 2.5rem;
      z-index: 15;
      max-width: 42rem;
      font-size: clamp(1.15rem, 1.8vw, 2.1rem);
      line-height: 1.04;
      letter-spacing: -0.07em;
      color: var(--skw-black);
      background: rgba(255, 255, 255, 0.78);
      padding: 0.55rem 0.75rem;
      backdrop-filter: blur(0.25rem);
    }

    .skw-project-caption strong {
      font-weight: 950;
    }

    .skw-floating-stack {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .skw-float-card {
      position: absolute;
      overflow: hidden;
      background: #eee;
      will-change: transform;
      box-shadow: 0 1.4rem 4rem rgba(0, 0, 0, 0.14);
    }

    .skw-float-card:nth-child(1) {
      left: 20.1vw;
      top: 62vh;
      width: 30.3vw;
      height: 22.2vw;
      z-index: 11;
    }

    .skw-float-card:nth-child(2) {
      right: 8.4vw;
      top: 100vh;
      width: 29.8vw;
      height: 36vw;
      z-index: 12;
    }

    .skw-float-card:nth-child(3) {
      left: 10.5vw;
      top: 142vh;
      width: 28vw;
      height: 36vw;
      z-index: 13;
    }

    .skw-float-card:nth-child(4) {
      right: 27vw;
      top: 180vh;
      width: 23vw;
      height: 16vw;
      z-index: 14;
    }

    .skw-section-break {
      height: 36vh;
      display: grid;
      place-items: center;
      background: var(--skw-white);
      font-size: clamp(2.8rem, 7vw, 8rem);
      font-weight: 950;
      letter-spacing: -0.09em;
      text-transform: uppercase;
    }

    /* Bottom dummy section */
    .skw-ending {
      min-height: 95vh;
      display: grid;
      place-items: center;
      background: var(--skw-yellow);
      color: var(--skw-black);
      text-align: center;
      padding: 6rem 2rem;
    }

    .skw-ending h2 {
      font-size: clamp(4rem, 11vw, 14rem);
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: -0.1em;
      text-transform: uppercase;
    }

    .skw-ending p {
      margin-top: 1.4rem;
      font-size: clamp(1rem, 1.8vw, 1.7rem);
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    @media (max-width: 991px) {
      :root {
        --skw-max: 86vw;
        --skw-header-h: 7.2rem;
      }

      body { cursor: auto; }
      .skw-cursor-dot { display: none; }

      .skw-header {
        padding: 1.35rem 1.5rem;
      }

      .skw-smile-logo {
        width: 4.4rem;
      }

      .skw-header-right {
        gap: 1.8rem;
      }

      .skw-languages {
        font-size: 1.1rem;
      }

      .skw-menu-btn {
        width: 2.55rem;
        height: 2rem;
        cursor: pointer;
      }

      .skw-mini-top-image {
        width: 40vw;
        min-width: 13rem;
        height: 3.4rem;
        margin-left: 50vw;
      }

      .skw-project {
        min-height: 245vh;
      }

      .skw-project-stage {
        min-height: 42rem;
      }

      .skw-featured-wrap {
        height: 58vh;
        margin-top: 2rem;
      }

      .skw-brand-mark {
        top: 6.7rem;
        width: 76vw;
      }

      .skw-project-caption {
        left: 7vw;
        bottom: 4.2rem;
        width: 70vw;
      }

      .skw-float-card:nth-child(1) {
        left: 7vw;
        width: 62vw;
        height: 43vw;
      }

      .skw-float-card:nth-child(2) {
        right: 6vw;
        width: 58vw;
        height: 72vw;
      }

      .skw-float-card:nth-child(3) {
        left: 11vw;
        width: 55vw;
        height: 70vw;
      }
    }

    @media (max-width: 575px) {
      :root {
        --skw-max: 90vw;
        --skw-header-h: 6.2rem;
      }

      .skw-header {
        height: var(--skw-header-h);
        padding: 1rem;
      }

      .skw-languages {
        display: none;
      }

      .skw-smile-logo {
        width: 3.8rem;
        border-width: 0.2rem;
      }

      .skw-smile-logo::after {
        width: 2.2rem;
        height: 1.2rem;
        border-width: 0.2rem;
      }

      .skw-mini-top-image {
        display: none;
      }

      .skw-hero-spacer {
        min-height: 20vh;
      }

      .skw-featured-wrap {
        width: 92vw;
        height: 57vh;
      }

      .skw-brand-mark {
        top: 5.8rem;
        width: 92vw;
        opacity: 0.82;
      }

      .skw-word-logo {
        font-size: clamp(3.3rem, 18vw, 7rem);
      }

      .skw-project-caption {
        left: 4vw;
        bottom: 5.2rem;
        width: 84vw;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="skw-cursor-dot" aria-hidden="true"></div>

  <header class="skw-header">
    <a href="#" class="skw-smile-logo" aria-label="Shivdutt Karwa home"></a>

            <figure class="skw-float-card"><img src="https://weareyellow.com/wp-content/uploads/2026/03/1022888_retocada_bn.jpg" alt=""></figure>
            <figure class="skw-float-card"><img src="https://weareyellow.com/wp-content/uploads/2026/03/Melia_Ibiza_0524-135.jpg" alt=""></figure>

      <!-- Project 03 -->

        <div class="skw-project-stage">

            <figure class="skw-float-card"><img src="https://weareyellow.com/wp-content/uploads/2026/03/Social-Paid-04-scaled.jpg" alt=""></figure>
            <figure class="skw-float-card"><img src="https://weareyellow.com/wp-content/uploads/2026/03/frame-10-2880x1620-1-scaled.png" alt=""></figure>

    <section class="skw-ending">
      <div>
        <h2>Pin<br>Release</h2>
        <p>The full-screen project image is pinned while the smaller images travel vertically.</p>
      </div>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* Smooth yellow cursor */
    const cursor = document.querySelector(".skw-cursor-dot");
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let cursorX = mouseX;
    let cursorY = mouseY;

    window.addEventListener("mousemove", (event) => {
      mouseX = event.clientX;
      mouseY = event.clientY;
    });

    gsap.ticker.add(() => {
      cursorX += (mouseX - cursorX) * 0.18;
      cursorY += (mouseY - cursorY) * 0.18;
      gsap.set(cursor, { x: cursorX, y: cursorY });
    });

    document.querySelectorAll("a, button").forEach((item) => {
      item.addEventListener("mouseenter", () => cursor.classList.add("is-small"));
      item.addEventListener("mouseleave", () => cursor.classList.remove("is-small"));
    });

    /* Pinned portfolio animation */
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (!reduceMotion) {
      document.querySelectorAll(".skw-project").forEach((project) => {
        const stage = project.querySelector(".skw-project-stage");
        const featured = project.querySelector(".skw-featured-wrap");
        const featuredImg = project.querySelector(".skw-featured-wrap img");
        const brand = project.querySelector(".skw-brand-mark");
        const caption = project.querySelector(".skw-project-caption");
        const cards = gsap.utils.toArray(project.querySelectorAll(".skw-float-card"));

        const tl = gsap.timeline({
          defaults: { ease: "none" },
          scrollTrigger: {
            trigger: project,
            start: "top top",
            end: "+=230%",
            pin: stage,
            pinSpacing: true,
            scrub: 1.25,
            anticipatePin: 1,
            invalidateOnRefresh: true
          }
        });

        tl.fromTo(featured,
          { yPercent: 0, scale: 1 },
          { yPercent: -3, scale: 0.985, duration: 1 },
          0
        );

        tl.fromTo(featuredImg,
          { scale: 1.08, yPercent: 1.5 },
          { scale: 1, yPercent: -2.2, duration: 1 },
          0
        );

        tl.fromTo(brand,
          { yPercent: 14, opacity: 1 },
          { yPercent: -26, opacity: 0.96, duration: 1 },
          0
        );

        tl.fromTo(caption,
          { autoAlpha: 1, y: 0 },
          { autoAlpha: 0, y: -42, duration: 0.28 },
          0.2
        );

        cards.forEach((card, index) => {
          /*
            Use real viewport-based Y movement instead of yPercent.
            This makes every image enter from below and leave fully above
            before the pin releases, so there is no top-edge jerk.
          */
          const startTime = 0.04 + index * 0.095;

          tl.fromTo(card,
            {
              y: () => window.innerHeight * (0.85 + index * 0.22),
              rotate: index % 2 === 0 ? -0.35 : 0.35,
              scale: 1.01
            },
            {
              y: () => -window.innerHeight * (2.45 + index * 0.18),
              rotate: index % 2 === 0 ? 0.25 : -0.25,
              scale: 1,
              duration: 1.08
            },
            startTime
          );

          const cardImg = card.querySelector("img");
          tl.fromTo(cardImg,
            { yPercent: -8, scale: 1.12 },
            { yPercent: 8, scale: 1.04, duration: 1.08 },
            startTime
          );
        });

        // Tiny empty buffer after the cards are gone, so pin release feels natural.
        tl.to({}, { duration: 0.18 });
      });
    }

    window.addEventListener("load", () => {
      ScrollTrigger.refresh();
    });
  </script>
</body>
</html>
