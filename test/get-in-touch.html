
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footer Hover Text</title>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Inter:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #111;
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .op-footer {
      width: 100%;
      min-height: 492px;
      background: #111;
      padding: 35px 56px 0;
      color: #fff;
      overflow: hidden;
    }

    .op-footer-frame {
      position: relative;
      width: 100%;
      min-height: 456px;
      border-top: 1px solid rgba(255, 255, 255, 0.18);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    }

    .footer-nav {
      position: absolute;
      top: 82px;
      left: 44.2%;
      display: flex;
      align-items: center;
      gap: 55px;
      z-index: 10;
    }

    .footer-nav a {
      color: #eeeeee;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      transition: opacity 0.3s ease;
    }

    .footer-nav a:hover {
      opacity: 0.45;
    }

    .footer-content {
      width: 100%;
      min-height: 456px;
      display: grid;
      grid-template-columns: 42.7% 57.3%;
      align-items: center;
      padding-top: 45px;
    }

    .social-list {
      display: flex;
      align-items: center;
      gap: 50px;
    }

    .circle-btn {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #2b2b2b;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      transition:
        color 0.45s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .circle-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: #fff;
      transform: scale(0);
      transform-origin: center;
      transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: -1;
    }

    .circle-btn:hover::before {
      transform: scale(1);
    }

    .circle-btn:hover {
      color: #111;
      transform: scale(0.985);
    }

    .circle-btn svg {
      display: block;
      fill: currentColor;
    }

    .linkedin svg {
      width: 30px;
      height: 30px;
    }

    .facebook svg {
      width: 24px;
      height: 31px;
    }

    .instagram svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
    }

    .cta-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 220px;
      overflow: visible;
      perspective: 900px;
    }

    .double-hover {
      position: relative;
      display: inline-block;
      overflow: hidden;
      text-decoration: none;
      white-space: nowrap;
      font-family: "Barlow Condensed", Impact, "Arial Narrow", sans-serif;
      font-size: clamp(92px, 10vw, 192px);
      line-height: 0.82;
      letter-spacing: -0.022em;
      text-transform: uppercase;
      font-weight: 900;
      cursor: pointer;
      transform: translateY(8px) scaleX(0.92);
      transform-origin: left center;
      perspective: 900px;
    }

    .text-line {
      display: flex;
      align-items: flex-start;
      white-space: nowrap;
      pointer-events: none;
      transform-style: preserve-3d;
    }

    .base-line {
      position: relative;
      color: #2b2b2b;
    }

    .hover-line {
      position: absolute;
      top: 0;
      left: 0;
      color: #ffffff;
    }

    .char {
      position: relative;
      display: inline-block;
      will-change: transform;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .space {
      width: 0.28em;
    }

    @media (max-width: 1300px) {
      .op-footer {
        padding-inline: 34px;
      }

      .footer-nav {
        left: 43%;
        gap: 34px;
      }

      .social-list {
        gap: 28px;
      }

      .circle-btn {
        width: 145px;
        height: 145px;
      }

      .double-hover {
        font-size: clamp(78px, 9vw, 145px);
      }
    }

    @media (max-width: 900px) {
      body {
        align-items: flex-start;
      }

      .op-footer {
        padding: 26px 20px;
      }

      .op-footer-frame {
        min-height: auto;
        padding: 44px 0;
      }

      .footer-nav {
        position: static;
        flex-wrap: wrap;
        gap: 22px;
        margin-bottom: 54px;
      }

      .footer-content {
        min-height: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 60px;
        padding-top: 0;
      }

      .social-list {
        width: 100%;
        justify-content: space-between;
        gap: 14px;
      }

      .circle-btn {
        width: 29vw;
        height: 29vw;
        max-width: 120px;
        max-height: 120px;
      }

      .cta-wrap {
        min-height: auto;
      }

      .double-hover {
        font-size: clamp(60px, 17vw, 100px);
        line-height: 0.88;
        letter-spacing: 0.01em;
      }
    }
  </style>
</head>

<body>

  <footer class="op-footer">
    <div class="op-footer-frame">

      <nav class="footer-nav">
        <a href="#">Creative</a>
        <a href="#">Directors</a>
        <a href="#">About</a>
        <a href="#">Press & Awards</a>
      </nav>

      <div class="footer-content">

        <div class="social-list">

          <a href="#" class="circle-btn linkedin" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24">
              <path d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.31 8.19h4.38V23H.31V8.19zM7.7 8.19h4.2v2.03h.06c.58-1.1 2.01-2.26 4.15-2.26 4.44 0 5.26 2.92 5.26 6.72V23H17v-7.38c0-1.76-.03-4.02-2.45-4.02-2.46 0-2.84 1.92-2.84 3.9V23H7.7V8.19z"/>
            </svg>
          </a>

          <a href="#" class="circle-btn facebook" aria-label="Facebook">
            <svg viewBox="0 0 24 24">
              <path d="M15.12 8.32H18V4h-3.39C10.8 4 8.8 6.22 8.8 9.34v2.74H6v4.42h2.8V24h4.6v-7.5h3.82l.61-4.42H13.4V9.78c0-1.01.27-1.46 1.72-1.46z"/>
            </svg>
          </a>

          <a href="#" class="circle-btn instagram" aria-label="Instagram">
            <svg viewBox="0 0 32 32">
              <rect x="7" y="7" width="18" height="18" rx="5"></rect>
              <circle cx="16" cy="16" r="4.7"></circle>
              <circle cx="22" cy="10.4" r="1.25" fill="currentColor" stroke="none"></circle>
            </svg>
          </a>

        </div>

        <div class="cta-wrap">
          <a href="#" class="double-hover" data-text="Get in touch" aria-label="Get in touch">
            <span class="text-line base-line"></span>
            <span class="text-line hover-line"></span>
          </a>
        </div>

      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    document.querySelectorAll(".double-hover").forEach((link) => {
      const text = link.dataset.text || link.textContent.trim();
      const baseLine = link.querySelector(".base-line");
      const hoverLine = link.querySelector(".hover-line");

      function createLetters(target) {
        target.innerHTML = "";

        [...text].forEach((letter) => {
          const span = document.createElement("span");

          if (letter === " ") {
            span.className = "char space";
            span.innerHTML = "&nbsp;";
          } else {
            span.className = "char";
            span.textContent = letter;
          }

          target.appendChild(span);
        });
      }

      createLetters(baseLine);
      createLetters(hoverLine);

      const baseChars = baseLine.querySelectorAll(".char");
      const hoverChars = hoverLine.querySelectorAll(".char");

      gsap.set(baseChars, {
        yPercent: 0,
        scaleY: 1,
        rotateX: 0,
        z: 0,
        transformOrigin: "50% 0%"
      });

      gsap.set(hoverChars, {
        yPercent: 26,
        scaleY: 0.08,
        rotateX: -82,
        z: -40,
        opacity: 1,
        transformOrigin: "50% 100%"
      });

      function playHover() {
        gsap.killTweensOf([baseChars, hoverChars]);

        gsap.to(baseChars, {
          yPercent: -28,
          scaleY: 0.08,
          rotateX: 82,
          z: -40,
          duration: 0.78,
          ease: "expo.out",
          stagger: {
            each: 0.018,
            from: "start"
          },
          transformOrigin: "50% 0%"
        });

        gsap.to(hoverChars, {
          yPercent: 0,
          scaleY: 1,
          rotateX: 0,
          z: 0,
          duration: 0.78,
          ease: "expo.out",
          stagger: {
            each: 0.018,
            from: "start"
          },
          transformOrigin: "50% 100%"
        });
      }

      function reverseHover() {
        gsap.killTweensOf([baseChars, hoverChars]);

        gsap.to(baseChars, {
          yPercent: 0,
          scaleY: 1,
          rotateX: 0,
          z: 0,
          duration: 0.78,
          ease: "expo.out",
          stagger: {
            each: 0.014,
            from: "end"
          },
          transformOrigin: "50% 0%"
        });

        gsap.to(hoverChars, {
          yPercent: 26,
          scaleY: 0.08,
          rotateX: -82,
          z: -40,
          duration: 0.78,
          ease: "expo.out",
          stagger: {
            each: 0.014,
            from: "end"
          },
          transformOrigin: "50% 100%"
        });
      }

      link.addEventListener("mouseenter", playHover);
      link.addEventListener("mouseleave", reverseHover);
      link.addEventListener("focus", playHover);
      link.addEventListener("blur", reverseHover);
    });
  </script>

</body>
</html>
