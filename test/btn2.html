<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samurai Code Preloader</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050303;
      --black: #090706;
      --red: #b51212;
      --red-dark: #4d0606;
      --gold: #f4c56f;
      --gold-soft: #ffe4aa;
      --white: #f7efe2;
      --muted: rgba(255, 239, 210, 0.58);
    }

    body {
      min-height: 100vh;
      background: #090909;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    body.loaded {
      overflow: auto;
    }

    /* ===============================
       PRELOADER MAIN WRAPPER
    =============================== */

    .shogun-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(173, 25, 25, 0.24), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(244, 197, 111, 0.08), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(181, 18, 18, 0.16), transparent 32%),
        linear-gradient(135deg, #030202, #0d0707 45%, #040303);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .shogun-loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .code-rain {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.42;
      mix-blend-mode: screen;
    }

    .loader-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 68px 68px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0.42;
    }

    .loader-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.88) 100%);
      pointer-events: none;
    }

    /* ===============================
       SLASH REVEAL
    =============================== */

    .slash-reveal {
      position: absolute;
      inset: -30%;
      z-index: 20;
      background:
        linear-gradient(
          115deg,
          transparent 0%,
          transparent 43%,
          rgba(255, 255, 255, 0.95) 48%,
          rgba(244, 197, 111, 0.95) 50%,
          rgba(181, 18, 18, 0.95) 52%,
          transparent 58%,
          transparent 100%
        );
      transform: translateX(-115%) rotate(-8deg);
      opacity: 0;
      pointer-events: none;
    }

    .shogun-loader.exit .slash-reveal {
      animation: slashExit 1.1s cubic-bezier(.19,1,.22,1) forwards;
    }

    @keyframes slashExit {
      0% {
        transform: translateX(-115%) rotate(-8deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateX(115%) rotate(-8deg);
        opacity: 0;
      }
    }

    /* ===============================
       CENTERPIECE
    =============================== */

    .loader-core {
      position: relative;
      width: min(520px, 92vw);
      min-height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .aura-orb {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(181, 18, 18, 0.45), transparent 58%),
        radial-gradient(circle at 35% 20%, rgba(244, 197, 111, 0.23), transparent 38%);
      filter: blur(34px);
      animation: auraPulse 2.8s ease-in-out infinite alternate;
      z-index: -3;
    }

    @keyframes auraPulse {
      from {
        transform: scale(0.88);
        opacity: 0.58;
      }
      to {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    .cyber-ring,
    .cyber-ring.second,
    .cyber-ring.third {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(244, 197, 111, 0.18);
      box-shadow:
        inset 0 0 26px rgba(181,18,18,0.18),
        0 0 34px rgba(244,197,111,0.08);
      z-index: -1;
    }

    .cyber-ring {
      width: 330px;
      height: 330px;
      animation: ringSpin 12s linear infinite;
    }

    .cyber-ring.second {
      width: 250px;
      height: 250px;
      border-style: dashed;
      border-color: rgba(255, 255, 255, 0.15);
      animation: ringSpinReverse 9s linear infinite;
    }

    .cyber-ring.third {
      width: 410px;
      height: 410px;
      border-color: rgba(181, 18, 18, 0.18);
      animation: ringSpin 18s linear infinite;
    }

    .cyber-ring::before,
    .cyber-ring.second::before,
    .cyber-ring.third::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      top: 24px;
      left: 50%;
      box-shadow:
        0 0 12px var(--gold),
        0 0 28px rgba(244,197,111,0.6);
    }

    @keyframes ringSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes ringSpinReverse {
      to {
        transform: rotate(-360deg);
      }
    }

    /* ===============================
       SAMURAI SVG
    =============================== */

    .samurai-mark {
      position: relative;
      width: 230px;
      height: 230px;
      filter:
        drop-shadow(0 0 24px rgba(181,18,18,0.5))
        drop-shadow(0 0 42px rgba(244,197,111,0.16));
      animation: markFloat 3.5s ease-in-out infinite;
    }

    @keyframes markFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .samurai-mark svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .helmet {
      fill: url(#helmetGradient);
      stroke: rgba(255, 229, 180, 0.42);
      stroke-width: 1.5;
    }

    .horn {
      fill: none;
      stroke: var(--gold);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 10px rgba(244,197,111,0.7));
      stroke-dasharray: 260;
      stroke-dashoffset: 260;
      animation: drawHorn 1.8s ease forwards;
    }

    @keyframes drawHorn {
      to {
        stroke-dashoffset: 0;
      }
    }

    .mask-line {
      fill: none;
      stroke: rgba(255, 239, 210, 0.82);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: drawLine 2.2s ease forwards;
    }

    .mask-line:nth-child(odd) {
      animation-delay: 0.2s;
    }

    .eye {
      fill: #ffdf96;
      filter: drop-shadow(0 0 10px rgba(255, 223, 150, 0.9));
      animation: eyeBlink 2.2s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes drawLine {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes eyeBlink {
      0%, 88%, 100% {
        transform: scaleY(1);
        opacity: 1;
      }
      92% {
        transform: scaleY(0.2);
        opacity: 0.55;
      }
    }

    .code-chip {
      position: absolute;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: rgba(255, 236, 195, 0.72);
      padding: 8px 11px;
      border: 1px solid rgba(244, 197, 111, 0.16);
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow: 0 0 22px rgba(181,18,18,0.12);
    }

    .chip-1 {
      top: 120px;
      left: 10px;
      animation: chipFloat 3.4s ease-in-out infinite;
    }

    .chip-2 {
      top: 150px;
      right: 0;
      animation: chipFloat 3.8s ease-in-out infinite reverse;
    }

    .chip-3 {
      bottom: 130px;
      left: 38px;
      animation: chipFloat 4.2s ease-in-out infinite;
    }

    @keyframes chipFloat {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.65;
      }
      50% {
        transform: translateY(-12px);
        opacity: 1;
      }
    }

    /* ===============================
       LOADING TEXT PANEL
    =============================== */

    .loader-info {
      position: absolute;
      bottom: 0;
      width: min(470px, 90vw);
      padding: 22px 24px 24px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025)),
        rgba(7, 7, 7, 0.72);
      border: 1px solid rgba(244, 197, 111, 0.16);
      backdrop-filter: blur(18px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 30px 90px rgba(0,0,0,0.55);
    }

    .loader-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .loader-title h1 {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 900;
      text-shadow: 0 0 18px rgba(244, 197, 111, 0.32);
    }

    .loader-count {
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--white);
    }

    .terminal-line {
      min-height: 20px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
      color: rgba(255, 239, 210, 0.72);
      margin-bottom: 18px;
      white-space: nowrap;
      overflow: hidden;
    }

    .terminal-line::before {
      content: "> ";
      color: var(--red);
      text-shadow: 0 0 12px rgba(181,18,18,0.8);
    }

    .terminal-cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--gold);
      margin-left: 4px;
      vertical-align: middle;
      animation: cursorBlink 0.8s steps(2) infinite;
    }

    @keyframes cursorBlink {
      50% {
        opacity: 0;
      }
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 7px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.55);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, var(--red), #d66a31, var(--gold-soft));
      box-shadow:
        0 0 14px rgba(244, 197, 111, 0.8),
        0 0 28px rgba(181,18,18,0.5);
      transition: width 0.25s ease;
    }

    .progress-track::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: translateX(-120%);
      animation: progressShine 1.7s ease-in-out infinite;
    }

    @keyframes progressShine {
      to {
        transform: translateX(120%);
      }
    }

    /* ===============================
       PAGE CONTENT AFTER LOADING
    =============================== */

    .site-content {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(181,18,18,0.18), transparent 36%),
        linear-gradient(135deg, #070707, #0d0707);
      opacity: 0;
      transform: translateY(30px);
      transition: 1s cubic-bezier(.19,1,.22,1);
      padding: 32px;
      text-align: center;
    }

    body.loaded .site-content {
      opacity: 1;
      transform: translateY(0);
    }

    .site-content h2 {
      font-size: clamp(36px, 7vw, 90px);
      letter-spacing: -3px;
      line-height: 0.95;
      color: #fff0cf;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(181,18,18,0.35);
    }

    .site-content p {
      margin-top: 22px;
      max-width: 640px;
      color: rgba(255,255,255,0.68);
      line-height: 1.7;
      font-size: 16px;
    }

    @media (max-width: 620px) {
      .loader-core {
        min-height: 580px;
      }

      .samurai-mark {
        width: 190px;
        height: 190px;
      }

      .cyber-ring {
        width: 280px;
        height: 280px;
      }

      .cyber-ring.second {
        width: 220px;
        height: 220px;
      }

      .cyber-ring.third {
        width: 340px;
        height: 340px;
      }

      .code-chip {
        display: none;
      }

      .loader-title h1 {
        font-size: 11px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>

<body>

  <!-- PRELOADER -->
  <div class="shogun-loader" id="loader">
    <canvas class="code-rain" id="codeRain"></canvas>

    <div class="loader-grid"></div>
    <div class="loader-vignette"></div>
    <div class="slash-reveal"></div>

    <div class="loader-core">
      <div class="aura-orb"></div>
      <div class="cyber-ring"></div>
      <div class="cyber-ring second"></div>
      <div class="cyber-ring third"></div>

      <div class="code-chip chip-1">&lt;React /&gt;</div>
      <div class="code-chip chip-2">GSAP.init()</div>
      <div class="code-chip chip-3">{ UX: sharp }</div>

      <div class="samurai-mark">
        <svg viewBox="0 0 240 240">
          <defs>
            <linearGradient id="helmetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2b2421"/>
              <stop offset="45%" stop-color="#0d0b0a"/>
              <stop offset="100%" stop-color="#5c0909"/>
            </linearGradient>
          </defs>

          <!-- golden horns -->
          <path class="horn" d="M44 85 C18 62 18 36 43 23 C58 38 75 49 101 57" />
          <path class="horn" d="M196 85 C222 62 222 36 197 23 C182 38 165 49 139 57" />

          <!-- helmet -->
          <path class="helmet" d="
            M56 94
            C58 57 85 38 120 38
            C155 38 182 57 184 94
            L176 151
            C169 190 146 212 120 212
            C94 212 71 190 64 151
            Z
          "/>

          <!-- forehead crest -->
          <path class="mask-line" d="M85 78 C102 65 138 65 155 78" />
          <path class="mask-line" d="M120 48 L120 102" />

          <!-- eyes -->
          <path class="eye" d="M78 112 C92 104 105 104 114 112 C101 121 89 121 78 112Z" />
          <path class="eye" d="M126 112 C140 104 153 104 162 112 C149 121 137 121 126 112Z" />

          <!-- mask lines -->
          <path class="mask-line" d="M75 140 C96 151 105 161 111 184" />
          <path class="mask-line" d="M165 140 C144 151 135 161 129 184" />
          <path class="mask-line" d="M91 154 L149 154" />
          <path class="mask-line" d="M97 174 L143 174" />
          <path class="mask-line" d="M120 118 L120 200" />

          <!-- side plates -->
          <path class="mask-line" d="M58 104 L31 137 L61 145" />
          <path class="mask-line" d="M182 104 L209 137 L179 145" />
        </svg>
      </div>

      <div class="loader-info">
        <div class="loader-title">
          <h1>Forging Interface</h1>
          <div class="loader-count" id="loaderCount">000%</div>
        </div>

        <div class="terminal-line">
          <span id="terminalText"></span><span class="terminal-cursor"></span>
        </div>

        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DEMO CONTENT -->
  <main class="site-content">
    <div>
      <h2>Code. Craft. Honor.</h2>
      <p>
        Your website has entered with a cinematic samurai-code preloader. Replace this area with your real portfolio content.
      </p>
    </div>
  </main>

  <script>
    /* ===============================
       CANVAS CODE RAIN
    =============================== */

    const canvas = document.getElementById("codeRain");
    const ctx = canvas.getContext("2d");

    let width;
    let height;
    let columns;
    let drops;

    const symbols = [
      "0", "1", "{", "}", "<", ">", "/", "=", ";",
      "JS", "CSS", "HTML", "React", "GSAP", "const", "fn"
    ];

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      columns = Math.floor(width / 26);
      drops = Array(columns).fill(1);
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function drawCodeRain() {
      ctx.fillStyle = "rgba(5, 3, 3, 0.12)";
      ctx.fillRect(0, 0, width, height);

      ctx.font = "13px Consolas, monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = symbols[Math.floor(Math.random() * symbols.length)];
        const x = i * 26;
        const y = drops[i] * 22;

        const glow = Math.random() > 0.86;
        ctx.fillStyle = glow
          ? "rgba(244, 197, 111, 0.86)"
          : "rgba(190, 42, 32, 0.52)";

        ctx.fillText(text, x, y);

        if (y > height && Math.random() > 0.965) {
          drops[i] = 0;
        }

        drops[i]++;
      }

      requestAnimationFrame(drawCodeRain);
    }

    drawCodeRain();

    /* ===============================
       LOADER PROGRESS
    =============================== */

    const loader = document.getElementById("loader");
    const progressBar = document.getElementById("progressBar");
    const loaderCount = document.getElementById("loaderCount");
    const terminalText = document.getElementById("terminalText");

    const lines = [
      "initializing samurai interface...",
      "compiling motion system...",
      "forging responsive layout...",
      "loading visual assets...",
      "syncing code with craft...",
      "final slash reveal ready..."
    ];

    let progress = 0;
    let lineIndex = 0;
    let charIndex = 0;
    let currentText = "";

    function typeTerminal() {
      const fullLine = lines[lineIndex];

      if (charIndex < fullLine.length) {
        currentText += fullLine.charAt(charIndex);
        terminalText.textContent = currentText;
        charIndex++;
        setTimeout(typeTerminal, 38);
      } else {
        setTimeout(() => {
          currentText = "";
          charIndex = 0;
          lineIndex = (lineIndex + 1) % lines.length;
          terminalText.textContent = "";
          typeTerminal();
        }, 650);
      }
    }

    typeTerminal();

    const loadInterval = setInterval(() => {
      const speed = progress < 72 ? Math.random() * 7 : Math.random() * 3;
      progress += speed;

      if (progress >= 100) {
        progress = 100;
        clearInterval(loadInterval);

        progressBar.style.width = "100%";
        loaderCount.textContent = "100%";

        setTimeout(() => {
          loader.classList.add("exit");
        }, 350);

        setTimeout(() => {
          loader.classList.add("hide");
          document.body.classList.add("loaded");
        }, 1300);
      }

      const cleanProgress = Math.floor(progress);
      progressBar.style.width = cleanProgress + "%";
      loaderCount.textContent = String(cleanProgress).padStart(3, "0") + "%";
    }, 120);
  </script>

</body>
</html>
