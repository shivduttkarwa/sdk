<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samurai Buttons</title>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(160, 20, 20, 0.25), transparent 35%),
        linear-gradient(135deg, #080808, #120707 45%, #050505);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", Arial, sans-serif;
      color: white;
    }

    .samurai-btn-wrap {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 40px;
    }

    .samurai-btn {
      position: relative;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 16px 34px;
      min-width: 190px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      isolation: isolate;
      transition: 0.45s ease;
    }

    .samurai-btn span {
      position: relative;
      z-index: 3;
    }

    /* 1. Katana Slash Button */

    .btn-katana {
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04),
                  0 18px 45px rgba(0, 0, 0, 0.45);
      clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
    }

    .btn-katana::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 35%, #d91616 50%, transparent 65%);
      transform: translateX(-120%) skewX(-18deg);
      transition: 0.55s ease;
      z-index: 1;
    }

    .btn-katana::after {
      content: "";
      position: absolute;
      width: 120%;
      height: 1px;
      top: 50%;
      left: -10%;
      background: linear-gradient(90deg, transparent, #fff, #ff2323, transparent);
      transform: rotate(-8deg) scaleX(0);
      transition: 0.45s ease;
      z-index: 2;
    }

    .btn-katana:hover::before {
      transform: translateX(120%) skewX(-18deg);
    }

    .btn-katana:hover::after {
      transform: rotate(-8deg) scaleX(1);
    }

    .btn-katana:hover {
      color: #fff;
      box-shadow: 0 0 35px rgba(217, 22, 22, 0.45);
    }

    /* 2. Red Seal Button */

    .btn-seal {
      background: #8f0d0d;
      border: 1px solid rgba(255, 215, 160, 0.35);
      color: #fff1df;
      border-radius: 2px;
      box-shadow: 0 18px 45px rgba(143, 13, 13, 0.35);
    }

    .btn-seal::before,
    .btn-seal::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(255, 232, 194, 0.45);
      transition: 0.4s ease;
      z-index: 1;
    }

    .btn-seal::after {
      inset: 13px;
      opacity: 0.4;
    }

    .btn-seal:hover {
      background: #b31313;
      transform: translateY(-4px) rotate(-1deg);
      box-shadow: 0 24px 60px rgba(179, 19, 19, 0.5);
    }

    .btn-seal:hover::before {
      inset: 4px;
    }

    .btn-seal:hover::after {
      inset: 18px;
    }

    /* 3. Ghost Ink Button */

    .btn-ink {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #eee;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    .btn-ink::before {
      content: "";
      position: absolute;
      width: 30px;
      height: 30px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      filter: blur(16px);
      opacity: 0;
      transition: 0.55s ease;
      z-index: 1;
    }

    .btn-ink::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.22), transparent 20%),
        radial-gradient(circle at 70% 80%, rgba(180,0,0,0.38), transparent 28%);
      opacity: 0;
      transition: 0.45s ease;
      z-index: 1;
    }

    .btn-ink:hover::before {
      transform: translate(-50%, -50%) scale(8);
      opacity: 0.18;
    }

    .btn-ink:hover::after {
      opacity: 1;
    }

    .btn-ink:hover {
      border-color: rgba(255, 255, 255, 0.55);
      letter-spacing: 3px;
    }

    /* 4. Samurai Armor Glow Button */

    .btn-armor {
      background: linear-gradient(135deg, #151515, #070707);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.04),
                  0 18px 50px rgba(0, 0, 0, 0.6);
    }

    .btn-armor::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: conic-gradient(
        from 180deg,
        transparent,
        #a30f0f,
        #f4c16b,
        #a30f0f,
        transparent
      );
      opacity: 0;
      transition: 0.45s ease;
      z-index: -2;
      animation: rotateGlow 3s linear infinite;
    }

    .btn-armor::after {
      content: "";
      position: absolute;
      inset: 2px;
      background: linear-gradient(135deg, #151515, #070707);
      border-radius: 12px;
      z-index: -1;
    }

    .btn-armor:hover::before {
      opacity: 1;
    }

    .btn-armor:hover {
      transform: translateY(-5px);
      color: #f4c16b;
      box-shadow: 0 0 38px rgba(163, 15, 15, 0.45);
    }

    @keyframes rotateGlow {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .samurai-btn-wrap {
        flex-direction: column;
      }

      .samurai-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="samurai-btn-wrap">

    <button class="samurai-btn btn-katana">
      <span>Katana Slash</span>
    </button>

    <button class="samurai-btn btn-seal">
      <span>Red Seal</span>
    </button>

    <button class="samurai-btn btn-ink">
      <span>Ghost Ink</span>
    </button>

    <button class="samurai-btn btn-armor">
      <span>Armor Glow</span>
    </button>

  </div>

</body>
</html>
