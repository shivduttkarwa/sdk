<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone Video Frame</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b1b25, #050505 65%);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .phone-wrapper {
      position: relative;
      width: 310px;
      height: 635px;
      padding: 12px;
      border-radius: 48px;
      background: linear-gradient(
        145deg,
        #2b2b2f,
        #050505 45%,
        #3a3a3f
      );
      box-shadow:
        0 40px 90px rgba(0, 0, 0, 0.8),
        inset 0 0 12px rgba(255, 255, 255, 0.15),
        inset 0 0 35px rgba(0, 0, 0, 0.9);
    }

    .phone-wrapper::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 43px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
      z-index: 5;
    }

    .phone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 38px;
      overflow: hidden;
      background: #000;
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .phone-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 28px;
      background: #050505;
      border-radius: 999px;
      z-index: 10;
      box-shadow:
        inset 0 0 8px rgba(255, 255, 255, 0.08),
        0 2px 8px rgba(0, 0, 0, 0.6);
    }

    .dynamic-island::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      width: 7px;
      height: 7px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, #243b55, #020202);
      box-shadow: 0 0 4px rgba(100, 140, 255, 0.5);
    }

    /* Side buttons */
    .btn-left-top,
    .btn-left-bottom,
    .btn-right {
      position: absolute;
      background: linear-gradient(180deg, #2c2c31, #080808);
      border-radius: 8px;
      box-shadow: inset 0 0 4px rgba(255, 255, 255, 0.15);
    }

    .btn-left-top {
      left: -4px;
      top: 125px;
      width: 4px;
      height: 42px;
    }

    .btn-left-bottom {
      left: -4px;
      top: 182px;
      width: 4px;
      height: 68px;
    }

    .btn-right {
      right: -4px;
      top: 155px;
      width: 4px;
      height: 85px;
    }

    /* Shine effect */
    .screen-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0.18),
        transparent 28%,
        transparent 65%,
        rgba(255, 255, 255, 0.08)
      );
      z-index: 8;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.45;
    }

    /* Optional floating effect */
    .phone-wrapper {
      animation: floatPhone 5s ease-in-out infinite;
    }

    @keyframes floatPhone {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    @media (max-width: 480px) {
      .phone-wrapper {
        width: 260px;
        height: 535px;
        border-radius: 42px;
      }

      .phone-screen {
        border-radius: 32px;
      }

      .dynamic-island {
        width: 78px;
        height: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="phone-wrapper">
    <div class="btn-left-top"></div>
    <div class="btn-left-bottom"></div>
    <div class="btn-right"></div>

    <div class="phone-screen">
      <div class="dynamic-island"></div>

      <video autoplay muted loop playsinline controls>
        <source src="../assets/hero-vid.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <div class="screen-shine"></div>
    </div>
  </div>

</body>
</html>
